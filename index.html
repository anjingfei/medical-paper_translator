<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>医学文献翻译练习</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #657083;
      --line: #d9e0ea;
      --panel: #ffffff;
      --wash: #f5f7fb;
      --accent: #166b68;
      --accent-strong: #0d4f4d;
      --accent-soft: #e4f3f1;
      --mark: #b55b1e;
      --shadow: 0 16px 36px rgba(28, 39, 56, 0.09);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--wash);
      color: var(--ink);
      line-height: 1.65;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      min-height: 42px;
      padding: 8px 14px;
      transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    button.primary:hover,
    button.primary:focus-visible {
      background: var(--accent-strong);
    }

    button.ghost {
      background: transparent;
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 760px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 10px;
      min-width: 320px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: 0 8px 20px rgba(28, 39, 56, 0.04);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .toolbar label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      max-width: 100%;
      min-width: 0;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 36px 8px 12px;
    }

    .toolbar select {
      flex: 1 1 180px;
    }

    .toolbar #diseaseFilter {
      flex-basis: 140px;
    }

    .search-field {
      position: relative;
      flex: 1 1 220px;
      min-width: 180px;
    }

    .toolbar #searchInput {
      width: 100%;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 12;
      display: none;
      max-height: 260px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 6px;
    }

    .search-results.visible {
      display: grid;
      gap: 4px;
    }

    .search-result {
      width: 100%;
      min-height: 0;
      padding: 8px 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      text-align: left;
      line-height: 1.45;
      transform: none;
    }

    .search-result:hover,
    .search-result:focus-visible {
      background: var(--accent-soft);
      border-color: transparent;
      transform: none;
    }

    .search-result strong,
    .search-result span {
      display: block;
    }

    .search-result strong {
      font-size: 14px;
    }

    .search-result span {
      color: var(--muted);
      font-size: 12px;
    }

    .search-empty {
      color: var(--muted);
      font-size: 14px;
      padding: 9px 10px;
    }

    .toolbar #articleSelect {
      flex: 2 1 240px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 0.82fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding: 18px 20px;
    }

    .panel-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 8px;
      background: #edf1f6;
      color: #374154;
      font-size: 13px;
      font-weight: 700;
      padding: 3px 9px;
    }

    .chip.accent {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .article-body {
      padding: 20px;
    }

    .english-text {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.82;
      color: #172033;
    }

    .practice {
      padding: 20px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fbfcfe;
      padding: 14px;
      line-height: 1.72;
    }

    textarea:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(22, 107, 104, 0.13);
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .result-banner {
      display: none;
      margin: 12px 0 0;
      border: 1px solid rgba(22, 107, 104, 0.22);
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 700;
      padding: 9px 12px;
    }

    .result-banner.visible {
      display: block;
    }

    .feedback {
      display: none;
      border-top: 1px solid var(--line);
      padding: 20px;
      background: #fbfcfe;
    }

    .feedback.visible {
      display: block;
    }

    .success-toast {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 30;
      display: grid;
      gap: 6px;
      min-width: min(320px, calc(100vw - 40px));
      max-width: calc(100vw - 40px);
      border: 1px solid rgba(13, 79, 77, 0.24);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 24px 60px rgba(24, 33, 47, 0.22);
      color: var(--ink);
      padding: 18px 20px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -44%) scale(0.96);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .success-toast.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .success-toast strong {
      color: var(--accent-strong);
      font-size: 20px;
      line-height: 1.35;
    }

    .success-toast span {
      color: var(--muted);
      font-size: 14px;
    }

    .section-title {
      margin: 0 0 10px;
      color: #263246;
      font-size: 16px;
      line-height: 1.35;
    }

    .translation {
      margin: 0 0 18px;
      color: #263246;
      white-space: pre-wrap;
    }

    .terms {
      display: grid;
      gap: 8px;
      margin: 0 0 18px;
    }

    .term {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
    }

    .term strong {
      color: var(--accent-strong);
    }

    .term span {
      color: var(--muted);
    }

    .self-rate {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .self-rate button.selected {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .notes {
      color: var(--muted);
      font-size: 14px;
      margin: 12px 0 0;
    }

    .history {
      margin-top: 16px;
      padding: 18px 20px;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .history-item strong {
      color: var(--ink);
    }

    .empty-state {
      color: var(--muted);
      margin: 0;
    }

    @media (max-width: 900px) {
      .topbar {
        display: block;
      }

      .stats {
        margin-top: 16px;
        min-width: 0;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .app-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      .stats,
      .self-rate {
        grid-template-columns: 1fr 1fr;
      }

      .panel-header,
      .history-item {
        display: block;
      }

      .actions button,
      .toolbar button,
      .toolbar select {
        width: 100%;
      }

      textarea {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>医学文献翻译练习</h1>
        <p class="subtitle">按《临床常见疾病医学英语文献阅读》目录建立科室索引，选择科室后进入对应文献翻译练习。</p>
      </div>
      <div class="stats" aria-label="练习统计">
        <div class="stat">
          <span>已完成</span>
          <strong id="completedCount">0</strong>
        </div>
        <div class="stat">
          <span>资料库</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat">
          <span>当前词数</span>
          <strong id="wordCount">0</strong>
        </div>
      </div>
    </header>

    <section class="toolbar" aria-label="练习控制">
      <label for="diseaseFilter">科室分类</label>
      <select id="diseaseFilter"></select>
      <label for="searchInput">搜索文献</label>
      <div class="search-field">
        <input id="searchInput" type="search" placeholder="输入题目或主题" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <label for="articleSelect">文献主题</label>
      <select id="articleSelect"></select>
      <button type="button" id="randomBtn">随机下一篇</button>
      <button type="button" id="resetBtn" class="ghost">清空当前输入</button>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" id="articleTitle"></h2>
            <div class="meta-row" id="metaRow"></div>
          </div>
          <button type="button" id="toggleReferenceBtn">查看参考</button>
        </div>
        <div class="article-body">
          <p class="english-text" id="englishText"></p>
        </div>
      </article>

      <aside class="panel">
        <div class="practice">
          <label class="field-label" for="translationInput">
            <span>我的中文译文</span>
            <span id="savedStatus">未保存</span>
          </label>
          <textarea id="translationInput" placeholder="在这里输入你的中文翻译。完成后点击提交，对照参考译文和重点术语。"></textarea>
          <div class="actions">
            <button type="button" id="submitBtn" class="primary">提交并对照</button>
            <button type="button" id="saveBtn">保存草稿</button>
          </div>
          <p class="result-banner" id="resultBanner" role="status" aria-live="polite"></p>
        </div>

        <div class="feedback" id="feedback">
          <h3 class="section-title">参考译文</h3>
          <p class="translation" id="referenceTranslation"></p>

          <h3 class="section-title">重点术语</h3>
          <div class="terms" id="terms"></div>

          <h3 class="section-title">学习提示</h3>
          <p class="translation" id="studyTip"></p>

          <h3 class="section-title">本次自评</h3>
          <div class="self-rate" id="selfRate">
            <button type="button" data-rate="1">需重练</button>
            <button type="button" data-rate="2">基本理解</button>
            <button type="button" data-rate="3">较流畅</button>
            <button type="button" data-rate="4">可复述</button>
          </div>
          <p class="notes" id="feedbackNote"></p>
        </div>
      </aside>
    </section>

    <section class="panel history">
      <h2 class="panel-title">最近练习记录</h2>
      <div class="history-list" id="historyList"></div>
    </section>
  </main>

  <div class="success-toast" id="successToast" role="status" aria-live="polite" aria-atomic="true">
    <strong id="toastTitle">提交成功</strong>
    <span id="toastMessage">正在打开中文翻译对照</span>
  </div>

  <script>
    const categoryOrder = [
          "全部",
          "内科",
          "外科",
          "妇产科",
          "儿科"
    ];

    const literatureSegments = [
          {
                "id": "internal-medicine-hypertension-management-in-elderly-patients",
                "englishTitle": "Hypertension Management in Elderly Patients",
                "chineseTitle": "Hypertension Management in Elderly Patients",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "初中级",
                "englishText": "Hypertension in older adults is a major contributor to stroke, heart failure, chronic kidney disease, and cognitive decline. Age-related arterial stiffening increases systolic blood pressure and widens pulse pressure, while baroreceptor sensitivity and renal sodium handling often become impaired. Diagnosis should be based on repeated standardized office measurements, supported by home or ambulatory blood pressure monitoring when white-coat or masked hypertension is suspected. Treatment begins with salt reduction, weight control, regular aerobic activity, moderation of alcohol intake, and review of medications that may raise blood pressure. Thiazide-type diuretics, calcium channel blockers, angiotensin-converting enzyme inhibitors, and angiotensin receptor blockers are commonly used, with drug selection individualized by comorbidities and tolerability. Randomized evidence supports antihypertensive therapy in older patients, but very intensive targets require caution in frail individuals because orthostatic hypotension, falls, electrolyte disturbances, and renal dysfunction may occur."
          },
          {
                "id": "internal-medicine-acute-coronary-syndrome-and-plaque-rupture",
                "englishTitle": "Acute Coronary Syndrome and Plaque Rupture",
                "chineseTitle": "Acute Coronary Syndrome and Plaque Rupture",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "初中级",
                "englishText": "Acute coronary syndrome usually results from rupture or erosion of an atherosclerotic plaque with superimposed platelet activation and thrombus formation. Patients may present with retrosternal chest pressure, dyspnea, diaphoresis, nausea, syncope, or atypical symptoms, especially in older adults, women, and patients with diabetes. Initial evaluation includes electrocardiography, cardiac troponin testing, hemodynamic assessment, and risk stratification. ST-segment elevation myocardial infarction requires urgent reperfusion by primary percutaneous coronary intervention when available, or fibrinolytic therapy when timely intervention cannot be achieved. Non-ST elevation syndromes are managed with antiplatelet therapy, anticoagulation, anti-ischemic treatment, high-intensity statins, and an invasive strategy for patients at elevated risk. Recurrent ischemia, ventricular arrhythmia, and mechanical complications require close monitoring during the early hospital phase. Secondary prevention includes smoking cessation, blood pressure and lipid control, cardiac rehabilitation, beta-blockers when indicated, and long-term antithrombotic therapy according to bleeding risk."
          },
          {
                "id": "internal-medicine-type-2-diabetes-and-cardiovascular-risk",
                "englishTitle": "Type 2 Diabetes and Cardiovascular Risk",
                "chineseTitle": "Type 2 Diabetes and Cardiovascular Risk",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "初中级",
                "englishText": "Type 2 diabetes mellitus is characterized by insulin resistance, progressive beta-cell dysfunction, and chronic hyperglycemia. Long-standing metabolic abnormalities promote microvascular complications, including retinopathy, nephropathy, and neuropathy, as well as accelerated atherosclerotic cardiovascular disease. Diagnosis is based on fasting plasma glucose, glycated hemoglobin, oral glucose tolerance testing, or random glucose with classic symptoms. Management requires structured nutrition therapy, physical activity, weight reduction when appropriate, and individualized pharmacologic therapy. Metformin remains a common initial agent unless contraindicated. In patients with established cardiovascular disease, heart failure, or chronic kidney disease, sodium-glucose cotransporter 2 inhibitors or glucagon-like peptide-1 receptor agonists may provide organ-protective benefits beyond glucose lowering. Glycemic targets should consider age, hypoglycemia risk, disease duration, comorbid illness, and patient preference. Screening for albuminuria, retinal disease, foot ulcers, dyslipidemia, and hypertension is essential for comprehensive care."
          },
          {
                "id": "internal-medicine-chronic-obstructive-pulmonary-disease-exacerbation",
                "englishTitle": "Chronic Obstructive Pulmonary Disease Exacerbation",
                "chineseTitle": "Chronic Obstructive Pulmonary Disease Exacerbation",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "初中级",
                "englishText": "Chronic obstructive pulmonary disease is a progressive inflammatory airway disorder most commonly associated with tobacco exposure, biomass smoke, occupational dust, or genetic susceptibility such as alpha-1 antitrypsin deficiency. An acute exacerbation is defined by worsening dyspnea, cough, sputum volume, or sputum purulence beyond usual daily variation. Viral infection, bacterial infection, air pollution, and poor inhaler adherence are common triggers. Evaluation should assess oxygen saturation, respiratory effort, mental status, comorbid cardiac disease, and the possibility of pneumonia, pulmonary embolism, or heart failure. Treatment includes short-acting bronchodilators, controlled oxygen therapy, systemic corticosteroids, and antibiotics when bacterial infection is likely. Noninvasive ventilation improves outcomes in selected patients with acute hypercapnic respiratory failure. Long-term prevention involves smoking cessation, vaccination, pulmonary rehabilitation, inhaled maintenance therapy based on symptoms and exacerbation history, and education on inhaler technique."
          },
          {
                "id": "internal-medicine-chronic-kidney-disease-and-proteinuria",
                "englishTitle": "Chronic Kidney Disease and Proteinuria",
                "chineseTitle": "Chronic Kidney Disease and Proteinuria",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "初中级",
                "englishText": "Chronic kidney disease is defined by persistent abnormalities of kidney structure or function, usually reflected by reduced estimated glomerular filtration rate, albuminuria, urinary sediment abnormalities, imaging changes, or histologic injury. Diabetes, hypertension, glomerulonephritis, polycystic kidney disease, and recurrent urinary obstruction are frequent causes. Proteinuria is both a marker of glomerular damage and a mediator of progressive tubulointerstitial inflammation and fibrosis. Clinical assessment includes blood pressure measurement, serum creatinine, electrolytes, urine albumin-to-creatinine ratio, urinalysis, renal ultrasound when indicated, and evaluation for systemic disease. Treatment focuses on slowing progression, reducing cardiovascular risk, and preventing complications. Renin-angiotensin system blockade reduces albuminuria in many patients, while sodium-glucose cotransporter 2 inhibitors have shown kidney-protective effects in selected populations. Anemia, metabolic acidosis, mineral and bone disorder, hyperkalemia, and volume overload require regular monitoring and individualized management."
          },
          {
                "id": "internal-medicine-community-acquired-pneumonia-in-adults",
                "englishTitle": "Community-Acquired Pneumonia in Adults",
                "chineseTitle": "Community-Acquired Pneumonia in Adults",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "初中级",
                "englishText": "Community-acquired pneumonia is an acute infection of the pulmonary parenchyma acquired outside the hospital or within the early period after admission. Streptococcus pneumoniae, respiratory viruses, Haemophilus influenzae, atypical bacteria, and aspiration-related organisms are common causes, depending on host factors and epidemiology. Patients typically report fever, cough, purulent sputum, pleuritic chest pain, dyspnea, or fatigue, although older adults may present with confusion or functional decline. Diagnosis is supported by compatible symptoms, focal lung findings, inflammatory markers, and chest imaging showing a new infiltrate. Severity assessment helps determine outpatient treatment, hospital admission, or intensive care. Empiric antibiotics should cover likely pathogens and be adjusted when microbiologic results become available. Supportive care includes oxygen, fluid management, fever control, and treatment of sepsis if present. Prevention relies on influenza vaccination, pneumococcal vaccination, smoking cessation, and management of chronic cardiopulmonary disease."
          },
          {
                "id": "internal-medicine-rheumatoid-arthritis-and-early-disease-control",
                "englishTitle": "Rheumatoid Arthritis and Early Disease Control",
                "chineseTitle": "Rheumatoid Arthritis and Early Disease Control",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Rheumatoid arthritis is a chronic systemic autoimmune disease characterized by synovial inflammation, autoantibody production, cartilage damage, and bone erosion. Patients often present with symmetric pain and swelling of small joints, morning stiffness lasting more than one hour, fatigue, and reduced hand function. Extra-articular manifestations may involve the lungs, eyes, skin, blood vessels, or cardiovascular system. Laboratory findings can include rheumatoid factor, anti-citrullinated protein antibodies, elevated erythrocyte sedimentation rate, or increased C-reactive protein, but diagnosis remains clinical and should consider imaging evidence of synovitis or erosion. Early initiation of disease-modifying antirheumatic drugs improves long-term outcomes. Methotrexate is commonly used as first-line therapy, with folate supplementation and monitoring for hepatic, hematologic, and pulmonary toxicity. Biologic or targeted synthetic agents may be added when disease activity remains high. Treatment aims for remission or low disease activity using regular assessment."
          },
          {
                "id": "internal-medicine-heart-failure-with-preserved-ejection-fraction",
                "englishTitle": "Heart Failure With Preserved Ejection Fraction",
                "chineseTitle": "Heart Failure With Preserved Ejection Fraction",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Heart failure with preserved ejection fraction is a clinical syndrome in which patients have symptoms and signs of heart failure despite a left ventricular ejection fraction that is not markedly reduced. The condition is common in older adults and is associated with hypertension, obesity, diabetes, chronic kidney disease, atrial fibrillation, and coronary artery disease. Pathophysiology includes impaired ventricular relaxation, increased chamber stiffness, endothelial inflammation, microvascular dysfunction, and elevated filling pressures during exertion. Patients may present with exertional dyspnea, orthopnea, edema, exercise intolerance, or recurrent hospitalization for congestion. Diagnosis requires clinical evaluation, natriuretic peptide measurement, echocardiography, and exclusion of mimicking disorders such as lung disease or anemia. Management includes diuretics for volume overload, aggressive treatment of hypertension, control of atrial fibrillation, weight management, exercise training, and treatment of comorbidities. Selected drug classes have demonstrated reductions in heart failure hospitalization."
          },
          {
                "id": "internal-medicine-liver-cirrhosis-and-portal-hypertension",
                "englishTitle": "Liver Cirrhosis and Portal Hypertension",
                "chineseTitle": "Liver Cirrhosis and Portal Hypertension",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Cirrhosis represents the final common pathway of chronic liver injury, with diffuse fibrosis, regenerative nodules, and distortion of hepatic vascular architecture. Common causes include chronic viral hepatitis, alcohol-associated liver disease, metabolic dysfunction-associated steatotic liver disease, autoimmune hepatitis, and cholestatic disorders. Portal hypertension develops when resistance to portal blood flow increases, leading to splenomegaly, thrombocytopenia, ascites, gastroesophageal varices, hepatic encephalopathy, and hepatorenal syndrome. Clinical evaluation includes liver biochemistry, coagulation tests, platelet count, viral serology, autoimmune markers when indicated, ultrasound, elastography, and endoscopic screening for varices. Management depends on the stage of disease and includes treatment of the underlying cause, vaccination, avoidance of hepatotoxic drugs, nutritional support, sodium restriction for ascites, nonselective beta-blockers or endoscopic therapy for variceal bleeding prevention, and surveillance for hepatocellular carcinoma. Liver transplantation should be considered in advanced decompensated disease."
          },
          {
                "id": "internal-medicine-sepsis-recognition-and-early-management",
                "englishTitle": "Sepsis Recognition and Early Management",
                "chineseTitle": "Sepsis Recognition and Early Management",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Sepsis is life-threatening organ dysfunction caused by a dysregulated host response to infection. It may arise from pneumonia, intra-abdominal infection, urinary tract infection, skin and soft tissue infection, meningitis, or bloodstream infection. Early clinical clues include fever or hypothermia, tachycardia, tachypnea, hypotension, altered mental status, oliguria, mottled skin, and elevated lactate. Diagnosis requires suspicion of infection and assessment for organ dysfunction rather than reliance on a single laboratory value. Initial management emphasizes rapid recognition, measurement of lactate, collection of appropriate cultures, prompt administration of broad-spectrum antimicrobials, fluid resuscitation for hypoperfusion, and vasopressors when shock persists despite adequate volume. Source control through drainage, debridement, device removal, or surgery is critical when a removable focus exists. Ongoing care includes antimicrobial de-escalation, hemodynamic monitoring, organ support, prevention of complications, and rehabilitation after critical illness."
          },
          {
                "id": "internal-medicine-atrial-fibrillation-and-stroke-prevention",
                "englishTitle": "Atrial Fibrillation and Stroke Prevention",
                "chineseTitle": "Atrial Fibrillation and Stroke Prevention",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Atrial fibrillation is the most common sustained cardiac arrhythmia in adults and is associated with aging, hypertension, valvular disease, heart failure, hyperthyroidism, obesity, alcohol use, and sleep apnea. Loss of coordinated atrial contraction and irregular ventricular response may cause palpitations, dyspnea, fatigue, dizziness, chest discomfort, or worsening heart failure. Some patients remain asymptomatic and are detected through pulse examination or electrocardiography. The major clinical hazard is thromboembolism, especially ischemic stroke arising from left atrial appendage thrombus. Evaluation includes assessment of reversible triggers, echocardiography, thyroid function, renal function, bleeding risk, and symptom burden. Management includes rate control, rhythm control in selected patients, anticoagulation according to thromboembolic risk, and treatment of associated conditions. Direct oral anticoagulants are widely used for nonvalvular atrial fibrillation, while warfarin remains necessary in some valvular or mechanical valve settings. Catheter ablation may improve symptoms in carefully selected patients."
          },
          {
                "id": "internal-medicine-iron-deficiency-anemia-in-adults",
                "englishTitle": "Iron Deficiency Anemia in Adults",
                "chineseTitle": "Iron Deficiency Anemia in Adults",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Iron deficiency anemia results from insufficient iron availability for hemoglobin synthesis and is commonly caused by chronic blood loss, inadequate intake, increased demand, or impaired absorption. In adults, occult gastrointestinal bleeding, heavy menstrual bleeding, pregnancy, malabsorption, bariatric surgery, and inflammatory bowel disease are important causes. Patients may report fatigue, exertional dyspnea, reduced exercise tolerance, palpitations, dizziness, pica, brittle nails, or restless legs. Laboratory evaluation typically shows microcytic hypochromic anemia, low ferritin, low transferrin saturation, and increased total iron-binding capacity, although ferritin may be falsely normal or elevated during inflammation. Management requires both iron replacement and identification of the underlying cause. Oral iron is effective for many patients, but gastrointestinal adverse effects and poor adherence are common. Intravenous iron is useful when rapid repletion is needed, oral therapy fails, absorption is impaired, or ongoing losses are substantial. Failure to respond should prompt reassessment of diagnosis and bleeding sources."
          },
          {
                "id": "internal-medicine-inflammatory-bowel-disease-flare",
                "englishTitle": "Inflammatory Bowel Disease Flare",
                "chineseTitle": "Inflammatory Bowel Disease Flare",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Inflammatory bowel disease includes ulcerative colitis and Crohn disease, both characterized by chronic relapsing intestinal inflammation driven by genetic susceptibility, immune dysregulation, microbial factors, and environmental triggers. A flare may present with diarrhea, abdominal pain, rectal bleeding, urgency, fever, weight loss, anemia, or extraintestinal manifestations involving joints, skin, eyes, and hepatobiliary structures. Evaluation should distinguish active inflammation from infection, irritable bowel syndrome, medication effects, and structural complications. Tests may include complete blood count, inflammatory markers, stool studies, fecal calprotectin, endoscopy, biopsy, and cross-sectional imaging when small bowel disease or abscess is suspected. Treatment depends on disease location, severity, prior response, and complications. Options include aminosalicylates for selected ulcerative colitis, corticosteroids for induction, immunomodulators, biologic agents, small-molecule therapies, nutrition support, and surgery for refractory or complicated disease. Long-term care includes vaccination, cancer surveillance, bone health, and monitoring for medication toxicity."
          },
          {
                "id": "internal-medicine-pulmonary-embolism-diagnosis-and-risk-stratification",
                "englishTitle": "Pulmonary Embolism Diagnosis and Risk Stratification",
                "chineseTitle": "Pulmonary Embolism Diagnosis and Risk Stratification",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中级",
                "englishText": "Pulmonary embolism occurs when thrombotic material, usually from deep veins of the legs or pelvis, obstructs the pulmonary arterial circulation. Risk factors include recent surgery, trauma, immobilization, cancer, pregnancy, estrogen therapy, inherited thrombophilia, prior venous thromboembolism, and acute medical illness. Clinical presentation is variable and may include sudden dyspnea, pleuritic chest pain, cough, hemoptysis, syncope, tachycardia, hypoxemia, or signs of deep vein thrombosis. Diagnostic evaluation begins with estimation of pretest probability. D-dimer testing can exclude disease in low-risk patients, while computed tomographic pulmonary angiography is commonly used when imaging is required. Hemodynamic instability suggests massive embolism and requires urgent evaluation. Treatment includes anticoagulation, with duration determined by provoking factors and recurrence risk. Thrombolysis, catheter-directed therapy, or surgical embolectomy may be considered for high-risk patients with shock or severe right ventricular dysfunction. Prevention relies on appropriate thromboprophylaxis in hospitalized and postoperative patients."
          },
          {
                "id": "internal-medicine-acute-kidney-injury-in-hospitalized-patients",
                "englishTitle": "Acute Kidney Injury in Hospitalized Patients",
                "chineseTitle": "Acute Kidney Injury in Hospitalized Patients",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中高级",
                "englishText": "Acute kidney injury is a sudden decline in renal function manifested by rising serum creatinine, reduced urine output, or both. It is common among hospitalized patients and is associated with increased mortality, prolonged stay, and later chronic kidney disease. Causes are often classified as prerenal hypoperfusion, intrinsic renal injury, or postrenal obstruction. Sepsis, dehydration, heart failure, nephrotoxic drugs, contrast exposure, rhabdomyolysis, glomerulonephritis, and urinary retention are frequent contributors. Evaluation includes volume status, medication review, urinalysis, urine microscopy, electrolytes, renal ultrasound when obstruction is possible, and assessment for systemic disease. Management focuses on correcting hypoperfusion, stopping nephrotoxins, adjusting drug doses, treating infection or obstruction, and monitoring potassium, acid-base status, and fluid balance. Dialysis is indicated for refractory hyperkalemia, severe acidosis, pulmonary edema, uremic complications, or certain toxin exposures. Recovery may be incomplete, so follow-up renal assessment after discharge is important."
          },
          {
                "id": "internal-medicine-acute-ischemic-stroke",
                "englishTitle": "Acute Ischemic Stroke",
                "chineseTitle": "Acute Ischemic Stroke",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中高级",
                "englishText": "Acute ischemic stroke results from sudden interruption of cerebral blood flow due to arterial thrombosis, embolism, or small vessel occlusion. Symptoms depend on the vascular territory and may include unilateral weakness, facial droop, speech disturbance, visual loss, ataxia, neglect, sensory loss, or altered consciousness. Rapid recognition is essential because reperfusion therapy is time sensitive. Initial assessment includes airway and circulation evaluation, blood glucose measurement, neurological scoring, noncontrast brain computed tomography or magnetic resonance imaging to exclude hemorrhage, and vascular imaging when large vessel occlusion is suspected. Intravenous thrombolysis may benefit eligible patients within an accepted time window, while mechanical thrombectomy improves outcomes in selected patients with proximal large vessel occlusion. Supportive care includes blood pressure management, swallowing assessment, antiplatelet or anticoagulant decisions, statin therapy, venous thromboembolism prevention, and early rehabilitation. Secondary prevention targets hypertension, diabetes, smoking, dyslipidemia, atrial fibrillation, and carotid disease."
          },
          {
                "id": "internal-medicine-peptic-ulcer-disease-and-helicobacter-pylori",
                "englishTitle": "Peptic Ulcer Disease and Helicobacter pylori",
                "chineseTitle": "Peptic Ulcer Disease and Helicobacter pylori",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中高级",
                "englishText": "Peptic ulcer disease involves mucosal ulceration in the stomach or duodenum caused by imbalance between aggressive factors and mucosal defense. Helicobacter pylori infection and nonsteroidal anti-inflammatory drug use are the most important causes, while smoking, severe physiologic stress, and certain medications increase risk. Patients may present with epigastric pain, early satiety, nausea, bloating, occult bleeding, iron deficiency anemia, melena, hematemesis, or perforation with sudden severe abdominal pain. Diagnosis may involve noninvasive testing for Helicobacter pylori, upper endoscopy, biopsy of gastric ulcers, and evaluation for complications. Treatment includes proton pump inhibitor therapy, eradication therapy when Helicobacter pylori is present, discontinuation or risk reduction of ulcerogenic drugs, and management of bleeding when necessary. Confirmation of eradication is recommended after therapy using appropriate testing. Alarm features such as weight loss, anemia, dysphagia, persistent vomiting, or older age at onset warrant endoscopic evaluation."
          },
          {
                "id": "internal-medicine-thyrotoxicosis-and-graves-disease",
                "englishTitle": "Thyrotoxicosis and Graves Disease",
                "chineseTitle": "Thyrotoxicosis and Graves Disease",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中高级",
                "englishText": "Thyrotoxicosis is the clinical state caused by excess circulating thyroid hormone, whereas hyperthyroidism refers to increased synthesis and secretion by the thyroid gland. Graves disease is the most common autoimmune cause and results from thyroid-stimulating immunoglobulins activating the thyrotropin receptor. Symptoms include weight loss, heat intolerance, tremor, palpitations, anxiety, insomnia, hyperdefecation, menstrual disturbance, proximal muscle weakness, and fatigue. Examination may reveal tachycardia, goiter, lid lag, warm skin, brisk reflexes, atrial fibrillation, or orbitopathy. Laboratory testing typically shows suppressed thyroid-stimulating hormone with elevated free thyroxine or triiodothyronine. Antibody testing and radionuclide uptake can help distinguish Graves disease from thyroiditis or toxic nodular disease. Treatment options include beta-blockers for symptom relief, antithyroid drugs, radioactive iodine, or thyroidectomy depending on severity, pregnancy status, comorbidities, and preference. Severe untreated thyrotoxicosis can progress to thyroid storm, a medical emergency requiring intensive treatment."
          },
          {
                "id": "internal-medicine-gout-and-urate-crystal-arthritis",
                "englishTitle": "Gout and Urate Crystal Arthritis",
                "chineseTitle": "Gout and Urate Crystal Arthritis",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中高级",
                "englishText": "Gout is an inflammatory arthritis caused by deposition of monosodium urate crystals in joints and soft tissues due to chronic hyperuricemia. Risk factors include male sex, older age, chronic kidney disease, diuretic use, obesity, hypertension, alcohol intake, purine-rich diet, metabolic syndrome, and genetic variation in urate transport. Acute attacks often cause abrupt severe pain, erythema, warmth, and swelling, classically at the first metatarsophalangeal joint but also involving ankles, knees, wrists, or elbows. Diagnosis is confirmed by identification of negatively birefringent needle-shaped crystals in synovial fluid, although clinical pattern and imaging may support diagnosis. Acute treatment includes nonsteroidal anti-inflammatory drugs, colchicine, or corticosteroids, chosen according to renal function and comorbidities. Long-term urate-lowering therapy is indicated for recurrent attacks, tophi, urate nephrolithiasis, or chronic kidney disease in appropriate patients. Flares may occur after therapy initiation, so prophylaxis and patient education are important."
          },
          {
                "id": "internal-medicine-tuberculosis-diagnosis-and-treatment-principles",
                "englishTitle": "Tuberculosis Diagnosis and Treatment Principles",
                "chineseTitle": "Tuberculosis Diagnosis and Treatment Principles",
                "category": "内科",
                "sourceCategory": "Internal Medicine",
                "difficulty": "中高级",
                "englishText": "Tuberculosis is an infectious disease caused by Mycobacterium tuberculosis and is transmitted through airborne droplet nuclei, most often affecting the lungs. Risk is increased by close exposure, immunosuppression, malnutrition, diabetes, chronic kidney disease, silicosis, homelessness, incarceration, and residence in high-burden settings. Pulmonary disease may present with chronic cough, fever, night sweats, weight loss, hemoptysis, fatigue, or abnormal chest imaging. Diagnosis involves sputum smear microscopy, nucleic acid amplification testing, mycobacterial culture, drug susceptibility testing, and evaluation for extrapulmonary involvement when symptoms suggest dissemination. Latent infection is identified by tuberculin skin testing or interferon-gamma release assays, neither of which distinguishes active disease. Standard treatment for drug-susceptible pulmonary tuberculosis uses multiple drugs to prevent resistance and achieve cure. Adherence support, monitoring for hepatotoxicity and visual symptoms, public health notification, contact tracing, and airborne isolation for contagious patients are essential components of management."
          },
          {
                "id": "surgery-acute-appendicitis-and-surgical-decision-making",
                "englishTitle": "Acute Appendicitis and Surgical Decision-Making",
                "chineseTitle": "Acute Appendicitis and Surgical Decision-Making",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "初中级",
                "englishText": "Acute appendicitis is commonly caused by obstruction of the appendiceal lumen by lymphoid hyperplasia, fecalith, tumor, or foreign material, followed by bacterial overgrowth, venous congestion, ischemia, and inflammation. Patients classically develop periumbilical pain that migrates to the right lower quadrant, accompanied by anorexia, nausea, low-grade fever, and localized tenderness. Leukocytosis and elevated inflammatory markers support the diagnosis, but imaging with ultrasound or computed tomography is often used when the presentation is atypical. Appendectomy remains the definitive treatment and may be performed laparoscopically in most stable patients. Antibiotic-first strategies can be effective for selected uncomplicated cases, although recurrence and later surgery remain concerns. Perforation, abscess, or generalized peritonitis requires broader antimicrobial coverage, drainage when appropriate, and timely operative management. Clinical judgment should incorporate age, pregnancy status, comorbidities, imaging findings, and local surgical expertise."
          },
          {
                "id": "surgery-gallstone-disease-and-acute-cholecystitis",
                "englishTitle": "Gallstone Disease and Acute Cholecystitis",
                "chineseTitle": "Gallstone Disease and Acute Cholecystitis",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "初中级",
                "englishText": "Gallstone disease results from precipitation of cholesterol, bilirubin, or mixed components within bile. Many gallstones are asymptomatic, but transient cystic duct obstruction may cause biliary colic, typically presenting as episodic right upper quadrant or epigastric pain after meals. Acute cholecystitis occurs when persistent obstruction triggers gallbladder inflammation, ischemia, and secondary infection. Patients often have fever, nausea, vomiting, leukocytosis, and a positive Murphy sign. Ultrasonography is the preferred initial imaging test and may show gallstones, gallbladder wall thickening, pericholecystic fluid, or sonographic tenderness. Liver enzymes and bilirubin help evaluate possible common bile duct obstruction. Treatment includes fasting, intravenous fluids, analgesia, antibiotics when infection is suspected, and early laparoscopic cholecystectomy for most operable patients. Percutaneous cholecystostomy may be considered in critically ill or high-risk patients who cannot tolerate surgery. Complications include empyema, gangrene, perforation, choledocholithiasis, pancreatitis, and recurrent biliary events."
          },
          {
                "id": "surgery-colorectal-cancer-screening-and-staging",
                "englishTitle": "Colorectal Cancer Screening and Staging",

                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "初中级",
                "englishText": "Colorectal cancer develops through accumulation of genetic and epigenetic alterations that transform normal mucosa into adenoma and invasive carcinoma. Risk factors include age, family history, inflammatory bowel disease, hereditary syndromes, obesity, smoking, alcohol use, processed meat intake, and physical inactivity. Screening aims to detect premalignant polyps or early cancer before symptoms occur. Options include colonoscopy, fecal immunochemical testing, stool DNA testing, flexible sigmoidoscopy, and computed tomographic colonography, with interval and modality determined by risk profile and local recommendations. Symptoms of established disease may include occult bleeding, iron deficiency anemia, altered bowel habit, abdominal pain, weight loss, or obstruction. Diagnosis requires colonoscopic biopsy. Staging relies on imaging and pathologic assessment of tumor invasion, nodal involvement, and distant metastasis. Treatment may include surgical resection, chemotherapy, radiotherapy for selected rectal cancers, targeted therapy, immunotherapy for specific molecular subtypes, and surveillance after curative treatment."
          },
          {
                "id": "surgery-trauma-hemorrhage-and-damage-control-resuscitation",
                "englishTitle": "Trauma Hemorrhage and Damage Control Resuscitation",
                "chineseTitle": "Trauma Hemorrhage and Damage Control Resuscitation",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "初中级",
                "englishText": "Uncontrolled hemorrhage is a leading preventable cause of death after major trauma. Severe bleeding produces tissue hypoperfusion, acidosis, hypothermia, coagulopathy, and endothelial dysfunction, creating a cycle that can rapidly become fatal. Initial management follows structured trauma assessment with attention to airway, breathing, circulation, disability, and exposure. External bleeding should be controlled immediately with direct pressure, tourniquets, hemostatic dressings, or pelvic binders when indicated. Damage control resuscitation emphasizes early balanced transfusion of red blood cells, plasma, and platelets, permissive hypotension before definitive control in selected patients, prevention of hypothermia, calcium replacement when needed, and avoidance of excessive crystalloid infusion. Tranexamic acid may reduce mortality when given early to appropriately selected bleeding trauma patients. Definitive hemorrhage control may require operative exploration, interventional radiology, endovascular techniques, fracture stabilization, or temporary packing followed by staged reconstruction."
          },
          {
                "id": "surgery-breast-cancer-evaluation-and-multimodal-therapy",
                "englishTitle": "Breast Cancer Evaluation and Multimodal Therapy",
                "chineseTitle": "Breast Cancer Evaluation and Multimodal Therapy",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "初中级",
                "englishText": "Breast cancer is a heterogeneous malignancy classified by histology, stage, hormone receptor status, human epidermal growth factor receptor 2 expression, and genomic risk features. Patients may present with a painless breast mass, nipple discharge, skin dimpling, nipple retraction, axillary lymphadenopathy, or abnormalities detected by screening mammography. Diagnostic evaluation usually includes clinical examination, mammography, ultrasound, and core needle biopsy. Magnetic resonance imaging may be useful in selected patients, including those with dense breasts, genetic predisposition, or complex local staging questions. Treatment is multimodal and may involve breast-conserving surgery with radiotherapy, mastectomy, sentinel lymph node biopsy, axillary surgery, endocrine therapy, chemotherapy, HER2-directed therapy, immunotherapy for selected triple-negative disease, or targeted agents. Neoadjuvant therapy can downstage tumors and provide information about treatment response. Survivorship care includes surveillance, management of lymphedema, bone health, menopausal symptoms, psychosocial support, and monitoring for recurrence."
          },
          {
                "id": "surgery-inguinal-hernia-diagnosis-and-repair",
                "englishTitle": "Inguinal Hernia Diagnosis and Repair",
                "chineseTitle": "Inguinal Hernia Diagnosis and Repair",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "初中级",
                "englishText": "An inguinal hernia occurs when abdominal contents protrude through a weakness in the groin region. Indirect hernias pass through the internal inguinal ring and may be related to a patent processus vaginalis, whereas direct hernias protrude through a weakness in the posterior wall of the inguinal canal. Patients often notice a groin bulge that enlarges with coughing, lifting, or standing and improves when supine. Pain may be absent or described as dragging discomfort. Diagnosis is usually clinical, but ultrasound or cross-sectional imaging can help when the examination is uncertain. Watchful waiting may be reasonable for minimally symptomatic men, but surgery is indicated for symptomatic hernias, enlarging defects, incarceration, strangulation, or patient preference. Repair may be open or laparoscopic, commonly using mesh to reduce recurrence. Emergency surgery is required when bowel compromise is suspected."
          },
          {
                "id": "surgery-perioperative-infection-prevention",
                "englishTitle": "Perioperative Infection Prevention",
                "chineseTitle": "Perioperative Infection Prevention",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "Surgical site infection is a common postoperative complication associated with increased pain, delayed healing, prolonged hospitalization, reoperation, and higher cost. Risk depends on wound class, operative duration, tissue perfusion, bacterial inoculum, diabetes control, obesity, smoking, immunosuppression, hypothermia, and breaks in sterile technique. Prevention begins before incision with appropriate patient optimization, hair removal only when necessary using clippers, skin antisepsis, normothermia, glycemic control, and administration of prophylactic antibiotics within the recommended preoperative window. Antibiotic selection should cover expected organisms for the procedure and should not be continued unnecessarily after clean operations. Intraoperative measures include meticulous hemostasis, gentle tissue handling, adequate irrigation when indicated, avoidance of dead space, and maintenance of oxygenation and perfusion. Postoperative surveillance relies on recognition of erythema, warmth, drainage, wound separation, fever, and deep organ-space infection. Treatment may require drainage, debridement, antibiotics, or removal of infected material."
          },
          {
                "id": "surgery-acute-pancreatitis-and-surgical-consultation",

                "chineseTitle": "Acute Pancreatitis and Surgical Consultation",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "Acute pancreatitis is an inflammatory disorder of the pancreas most often caused by gallstones or alcohol use, although hypertriglyceridemia, medications, trauma, endoscopic procedures, and metabolic disorders may contribute. Premature activation of pancreatic enzymes produces autodigestion, edema, necrosis, systemic inflammation, and organ dysfunction in severe cases. Patients typically present with acute epigastric pain radiating to the back, nausea, vomiting, and abdominal tenderness. Diagnosis is made when characteristic pain, elevated pancreatic enzymes, or imaging findings meet accepted criteria. Early management includes aggressive but individualized intravenous fluid resuscitation, analgesia, nutritional support, and assessment for complications. Routine prophylactic antibiotics are not indicated for sterile necrosis. Gallstone pancreatitis may require early cholecystectomy during the same admission if mild, or delayed intervention when severe inflammation is present. Infected necrosis, abdominal compartment syndrome, persistent biliary obstruction, or clinical deterioration warrants multidisciplinary management."
          },
          {
                "id": "surgery-thyroid-nodules-and-surgical-indications",
                "englishTitle": "Thyroid Nodules and Surgical Indications",
                "chineseTitle": "Thyroid Nodules and Surgical Indications",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "Thyroid nodules are common and are detected by palpation, ultrasound, or imaging performed for unrelated reasons. Most nodules are benign, but evaluation aims to identify malignancy, clinically significant compression, and functional autonomy. Initial assessment includes history, neck examination, serum thyroid-stimulating hormone, and high-resolution ultrasound. Sonographic features such as irregular margins, microcalcifications, marked hypoechogenicity, taller-than-wide shape, and suspicious cervical lymph nodes increase concern for cancer. Fine-needle aspiration is recommended according to nodule size and risk pattern. Hyperfunctioning nodules are rarely malignant and may require radionuclide scanning when thyroid-stimulating hormone is suppressed. Surgery is indicated for confirmed or suspected malignancy, compressive symptoms, substernal extension, cosmetic concerns, selected indeterminate cytology, or patient preference after counseling. Operative planning considers lobectomy versus total thyroidectomy, lymph node management, recurrent laryngeal nerve preservation, calcium homeostasis, and the need for postoperative thyroid hormone replacement."
          },
          {
                "id": "surgery-postoperative-ileus-after-abdominal-surgery",

                "chineseTitle": "Postoperative Ileus After Abdominal Surgery",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "Postoperative ileus is a transient impairment of gastrointestinal motility after surgery, most commonly following abdominal or pelvic operations. It results from autonomic neural reflexes, inflammatory mediators, opioid exposure, electrolyte disturbances, bowel manipulation, and immobility. Patients may develop abdominal distension, nausea, vomiting, inability to tolerate oral intake, delayed passage of flatus or stool, and diffuse discomfort. Diagnosis is usually clinical, but imaging may be needed to distinguish ileus from mechanical obstruction, anastomotic leak, abscess, or intra-abdominal bleeding. Management includes correction of hypokalemia or other metabolic abnormalities, minimization of opioids, early ambulation, careful fluid balance, chewing gum in some protocols, and gradual advancement of diet as bowel function returns. Nasogastric decompression is reserved for significant vomiting or distension. Enhanced recovery pathways reduce ileus risk by combining multimodal analgesia, early feeding, minimally invasive techniques, and avoidance of unnecessary tubes."
          },
          {
                "id": "surgery-small-bowel-obstruction",
                "englishTitle": "Small Bowel Obstruction",
                "chineseTitle": "Small Bowel Obstruction",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "Small bowel obstruction is a common surgical condition caused by interruption of intestinal transit. Adhesions from previous abdominal surgery are the leading cause in many populations, while hernias, tumors, Crohn disease, volvulus, and intussusception are also important. Patients typically develop colicky abdominal pain, distension, vomiting, obstipation, and dehydration. Physical findings may range from high-pitched bowel sounds to peritonitis when ischemia or perforation occurs. Evaluation includes serum electrolytes, renal function, lactate when strangulation is suspected, and imaging, with computed tomography providing information about transition point, closed-loop obstruction, bowel viability, and underlying cause. Initial treatment includes fluid resuscitation, electrolyte correction, bowel rest, nasogastric decompression in selected patients, and close serial examination. Many adhesive partial obstructions resolve without surgery. Urgent operation is required for peritonitis, strangulation, perforation, incarcerated hernia, closed-loop obstruction, or clinical deterioration despite nonoperative management."
          },
          {
                "id": "surgery-liver-trauma-and-nonoperative-management",
                "englishTitle": "Liver Trauma and Nonoperative Management",
                "chineseTitle": "Liver Trauma and Nonoperative Management",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "Blunt hepatic injury commonly occurs after motor vehicle collisions, falls, or direct abdominal trauma. The liver is vulnerable because of its size, vascularity, and fixed ligamentous attachments. Clinical presentation ranges from mild right upper quadrant tenderness to hemorrhagic shock. Initial management follows trauma resuscitation principles, with attention to airway, breathing, circulation, hemorrhage control, and associated injuries. Hemodynamically stable patients are commonly evaluated with contrast-enhanced computed tomography, which grades injury and detects active contrast extravasation, hemoperitoneum, or vascular complications. Nonoperative management is successful in many stable patients and includes monitoring, serial examinations, laboratory assessment, transfusion when necessary, and interventional radiology for arterial bleeding. Operative management is required for instability despite resuscitation, peritonitis, major associated injuries, or failed nonoperative care. Complications include delayed hemorrhage, bile leak, biloma, abscess, pseudoaneurysm, and abdominal compartment syndrome. Follow-up is guided by clinical course and injury severity."
          },
          {
                "id": "surgery-peripheral-arterial-disease-and-limb-ischemia",

                "chineseTitle": "Peripheral Arterial Disease and Limb Ischemia",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "Peripheral arterial disease results from atherosclerotic narrowing of lower extremity arteries and is associated with smoking, diabetes, hypertension, dyslipidemia, chronic kidney disease, and advanced age. Patients may report exertional calf, thigh, or buttock pain relieved by rest, but many have atypical symptoms or limited mobility. Critical limb-threatening ischemia presents with rest pain, nonhealing ulcers, gangrene, or infection and carries a high risk of amputation and cardiovascular events. Diagnosis is supported by pulse examination, ankle-brachial index, toe pressure measurement, duplex ultrasound, computed tomographic angiography, magnetic resonance angiography, or catheter angiography when intervention is planned. Management includes smoking cessation, antiplatelet therapy, statins, blood pressure and glucose control, supervised exercise therapy, wound care, and infection treatment. Revascularization by endovascular or open surgical techniques is considered for lifestyle-limiting claudication unresponsive to medical therapy or for limb-threatening ischemia. Multidisciplinary care improves limb salvage."
          },
          {
                "id": "surgery-abdominal-aortic-aneurysm",
                "englishTitle": "Abdominal Aortic Aneurysm",
                "chineseTitle": "Abdominal Aortic Aneurysm",
                "category": "外科",
                "sourceCategory": "Surgery",
                "difficulty": "中级",
                "englishText": "An abdominal aortic aneurysm is a permanent focal dilation of the abdominal aorta, most often below the renal arteries. Degeneration of the medial layer, inflammation, proteolytic enzyme activity, smoking, male sex, older age, hypertension, and family history contribute to aneurysm formation. Most aneurysms are asymptomatic and are detected by screening ultrasound or incidental imaging. Large or expanding aneurysms may cause abdominal, back, or flank pain. Rupture presents with hypotension, severe pain, syncope, and a pulsatile abdominal mass, although the classic triad is not always present. Surveillance intervals depend on aneurysm diameter and growth rate. Smoking cessation and cardiovascular risk reduction are important, but no medication reliably prevents expansion. Repair is recommended when rupture risk exceeds procedural risk, commonly based on size, rapid growth, symptoms, or morphology. Options include open surgical repair and endovascular aneurysm repair, with choice influenced by anatomy, comorbidity, durability, and patient preference."
          },
          {
                "id": "surgery-surgical-management-of-diverticulitis",
                "englishTitle": "Surgical Management of Diverticulitis",

                "sourceCategory": "Obstetrics and Gynecology",

                "englishText": "Postpartum hemorrhage is excessive bleeding after birth and remains a leading cause of maternal morbidity and mortality worldwide. The major causes are commonly remembered as uterine atony, retained placental tissue, genital tract trauma, and coagulation disorders. Risk factors include prolonged labor, overdistended uterus, chorioamnionitis, operative delivery, placenta previa, placental abruption, prior hemorrhage, and uterine fibroids, but bleeding can occur without warning. Clinical management requires rapid estimation of blood loss, assessment of vital signs, uterine tone, and identification of the bleeding source. Initial treatment includes uterine massage, oxytocin, intravenous access, fluid resuscitation, laboratory testing, and activation of a massive transfusion protocol when indicated. Additional uterotonic agents, tranexamic acid, manual removal of retained tissue, repair of lacerations, balloon tamponade, uterine artery embolization, compression sutures, or hysterectomy may be required. Early team communication and simulation-based preparation improve response to severe hemorrhage."
