    const chineseReferenceMap = {
          "internal-medicine-hypertension-management-in-elderly-patients": "老年高血压是卒中、心力衰竭、慢性肾脏病和认知下降的重要危险因素。随年龄增长，动脉僵硬使收缩压升高、脉压增宽，同时压力感受器敏感性和肾脏钠处理能力下降。诊断应依据重复的标准化诊室血压测量，疑似白大衣高血压或隐匿性高血压时，可结合家庭或动态血压监测。治疗从限盐、控制体重、规律有氧运动、限制饮酒以及复核升压药物开始。常用药物包括噻嗪类利尿剂、钙通道阻滞剂、血管紧张素转换酶抑制剂和血管紧张素受体阻滞剂，具体选择需结合合并症和耐受性。随机证据支持老年患者接受降压治疗，但体弱者采用过于强化的目标时需谨慎，因为可能发生体位性低血压、跌倒、电解质紊乱和肾功能异常。",
          "internal-medicine-acute-coronary-syndrome-and-plaque-rupture": "急性冠脉综合征通常由动脉粥样硬化斑块破裂或糜烂引起，并叠加血小板活化和血栓形成。患者可表现为胸骨后压榨感、呼吸困难、出汗、恶心、晕厥或不典型症状，老年人、女性和糖尿病患者尤其如此。初始评估包括心电图、心肌肌钙蛋白检测、血流动力学评估和风险分层。ST段抬高型心肌梗死需尽快再灌注，条件允许时首选直接经皮冠状动脉介入治疗，若不能及时介入则考虑溶栓。非ST段抬高型综合征需给予抗血小板、抗凝、抗缺血治疗和高强度他汀，并对高危患者采取侵入性策略。早期住院阶段应严密监测再发缺血、室性心律失常和机械并发症。二级预防包括戒烟、控制血压和血脂、心脏康复、必要时使用β受体阻滞剂，并按出血风险决定长期抗血栓治疗。",
          "internal-medicine-type-2-diabetes-and-cardiovascular-risk": "2型糖尿病以胰岛素抵抗、β细胞功能进行性下降和慢性高血糖为特征。长期代谢异常可促进视网膜病变、肾病和神经病变等微血管并发症，同时加速动脉粥样硬化性心血管疾病。诊断依据空腹血糖、糖化血红蛋白、口服葡萄糖耐量试验，或伴典型症状时的随机血糖。管理包括结构化营养治疗、体力活动、必要时减重和个体化药物治疗。若无禁忌，二甲双胍仍是常用初始药物。合并明确心血管病、心力衰竭或慢性肾脏病者，钠-葡萄糖协同转运蛋白2抑制剂或胰高糖素样肽-1受体激动剂可带来超越降糖的器官保护获益。血糖目标应结合年龄、低血糖风险、病程、合并症和患者偏好制定。还需筛查白蛋白尿、视网膜病变、足溃疡、血脂异常和高血压。",
          "internal-medicine-chronic-obstructive-pulmonary-disease-exacerbation": "慢性阻塞性肺疾病是一种进行性炎症性气道疾病，最常与吸烟、生物燃料烟雾、职业粉尘或α1抗胰蛋白酶缺乏等遗传易感因素有关。急性加重是指呼吸困难、咳嗽、痰量或脓性痰较日常波动明显恶化。常见诱因为病毒感染、细菌感染、空气污染和吸入装置依从性差。评估应关注血氧饱和度、呼吸做功、意识状态、合并心脏病，以及肺炎、肺栓塞或心力衰竭的可能。治疗包括短效支气管舒张剂、控制性氧疗、全身糖皮质激素，以及疑似细菌感染时使用抗生素。存在急性高碳酸血症性呼吸衰竭的部分患者，无创通气可改善结局。长期预防包括戒烟、接种疫苗、肺康复、根据症状和急性加重史选择吸入维持治疗，并进行吸入技术教育。",
          "internal-medicine-chronic-kidney-disease-and-proteinuria": "慢性肾脏病指肾结构或功能异常持续存在，常表现为估算肾小球滤过率下降、白蛋白尿、尿沉渣异常、影像改变或组织学损伤。糖尿病、高血压、肾小球肾炎、多囊肾和反复尿路梗阻是常见病因。蛋白尿既是肾小球损伤标志，也是促进肾小管间质炎症和纤维化进展的介质。临床评估包括血压、血清肌酐、电解质、尿白蛋白肌酐比、尿常规、必要时肾脏超声以及全身性疾病评估。治疗重点在于延缓进展、降低心血管风险并预防并发症。肾素-血管紧张素系统阻滞剂可降低许多患者的白蛋白尿，钠-葡萄糖协同转运蛋白2抑制剂也在特定人群中显示肾脏保护作用。贫血、代谢性酸中毒、矿物质和骨代谢异常、高钾血症以及容量负荷过重均需定期监测并个体化处理。",
          "internal-medicine-community-acquired-pneumonia-in-adults": "成人社区获得性肺炎是院外获得或入院早期发生的肺实质急性感染。常见病原体包括肺炎链球菌、呼吸道病毒、流感嗜血杆菌、非典型病原体和误吸相关微生物，具体取决于宿主因素和流行病学情况。患者常有发热、咳嗽、脓痰、胸膜性胸痛、呼吸困难或乏力，老年人可表现为意识混乱或功能下降。诊断依据相符症状、局灶性肺部体征、炎症指标以及胸部影像新发浸润影。严重程度评估有助于决定门诊治疗、住院或重症监护。经验性抗生素应覆盖可能病原体，并在获得微生物结果后调整。支持治疗包括氧疗、液体管理、退热和脓毒症处理。预防依赖流感疫苗、肺炎球菌疫苗、戒烟和慢性心肺疾病管理。",
          "internal-medicine-rheumatoid-arthritis-and-early-disease-control": "类风湿关节炎是一种慢性系统性自身免疫病，以滑膜炎症、自身抗体产生、软骨破坏和骨侵蚀为特征。患者常表现为小关节对称性疼痛和肿胀、晨僵超过一小时、乏力以及手功能下降。关节外表现可累及肺、眼、皮肤、血管或心血管系统。实验室可见类风湿因子、抗瓜氨酸化蛋白抗体、红细胞沉降率升高或C反应蛋白升高，但诊断仍以临床判断为主，并需结合滑膜炎或骨侵蚀的影像证据。早期启动改善病情抗风湿药可改善长期结局。甲氨蝶呤常作为一线治疗，并需补充叶酸以及监测肝脏、血液和肺毒性。若疾病活动度仍高，可加用生物制剂或靶向合成药物。治疗目标是在规律评估下达到缓解或低疾病活动度。",
          "internal-medicine-heart-failure-with-preserved-ejection-fraction": "射血分数保留型心力衰竭是一种临床综合征，患者虽左心室射血分数未明显降低，却存在心衰症状和体征。该病多见于老年人，并与高血压、肥胖、糖尿病、慢性肾脏病、房颤和冠心病相关。其病理生理包括心室舒张受损、心腔僵硬度增加、内皮炎症、微血管功能障碍以及运动时充盈压升高。患者可出现劳力性呼吸困难、端坐呼吸、水肿、运动耐量下降或因淤血反复住院。诊断需结合临床评估、利钠肽测定、超声心动图，并排除肺病或贫血等类似疾病。管理包括容量负荷过重时使用利尿剂、积极控制高血压、控制房颤、体重管理、运动训练和治疗合并症。部分药物类别已证实可减少心衰住院。",
          "internal-medicine-liver-cirrhosis-and-portal-hypertension": "肝硬化是慢性肝损伤的共同终末通路，表现为弥漫性纤维化、再生结节和肝血管结构扭曲。常见病因包括慢性病毒性肝炎、酒精相关肝病、代谢功能障碍相关脂肪性肝病、自身免疫性肝炎和胆汁淤积性疾病。门静脉高压源于门静脉血流阻力增加，可导致脾肿大、血小板减少、腹水、胃食管静脉曲张、肝性脑病和肝肾综合征。临床评估包括肝生化、凝血功能、血小板计数、病毒血清学、必要时自身免疫标志物、超声、弹性成像和内镜筛查静脉曲张。管理取决于疾病阶段，包括治疗病因、接种疫苗、避免肝毒性药物、营养支持、腹水限钠、使用非选择性β受体阻滞剂或内镜治疗预防静脉曲张出血，并监测肝细胞癌。晚期失代偿者应考虑肝移植。",
          "internal-medicine-sepsis-recognition-and-early-management": "脓毒症是感染导致宿主反应失调而引起的危及生命的器官功能障碍。感染来源可为肺炎、腹腔感染、尿路感染、皮肤软组织感染、脑膜炎或血流感染。早期线索包括发热或低体温、心动过速、呼吸急促、低血压、意识改变、少尿、皮肤花斑和乳酸升高。诊断需要怀疑感染并评估器官功能障碍，而不能依赖单一实验室指标。初始处理强调快速识别、测定乳酸、采集合适培养、及时使用广谱抗菌药、低灌注时液体复苏，以及足量补液后休克仍持续时使用血管活性药。若存在可清除感染灶，需通过引流、清创、移除装置或手术进行感染源控制。后续治疗包括抗菌药降阶梯、血流动力学监测、器官支持、并发症预防和危重病后康复。",
          "internal-medicine-atrial-fibrillation-and-stroke-prevention": "心房颤动是成人最常见的持续性心律失常，与衰老、高血压、瓣膜病、心力衰竭、甲状腺功能亢进、肥胖、饮酒和睡眠呼吸暂停相关。心房协调收缩丧失和心室反应不规则可导致心悸、呼吸困难、乏力、头晕、胸部不适或心衰加重。部分患者无症状，仅在脉搏检查或心电图中发现。主要临床危险是血栓栓塞，尤其是左心耳血栓引起的缺血性卒中。评估包括可逆诱因、超声心动图、甲状腺功能、肾功能、出血风险和症状负担。管理包括控制心室率、选择性节律控制、按血栓栓塞风险抗凝以及治疗相关疾病。非瓣膜性房颤广泛使用直接口服抗凝药，部分瓣膜病或机械瓣患者仍需华法林。导管消融可改善严格选择患者的症状。",
          "internal-medicine-iron-deficiency-anemia-in-adults": "缺铁性贫血是由于血红蛋白合成所需铁不足所致，常见原因包括慢性失血、摄入不足、需求增加或吸收障碍。成人的重要病因包括隐匿性胃肠道出血、月经过多、妊娠、吸收不良、减重手术和炎症性肠病。患者可有乏力、劳力性呼吸困难、运动耐量下降、心悸、头晕、异食癖、指甲脆裂或不宁腿。实验室通常表现为小细胞低色素性贫血、铁蛋白降低、转铁蛋白饱和度降低和总铁结合力升高，但炎症时铁蛋白可假性正常或升高。管理既要补铁，也要寻找基础病因。口服铁对许多患者有效，但胃肠不良反应和依从性差较常见。需要快速补足、口服失败、吸收受损或持续丢失明显时可用静脉铁。治疗无反应时应重新评估诊断和出血来源。",
          "internal-medicine-inflammatory-bowel-disease-flare": "炎症性肠病包括溃疡性结肠炎和克罗恩病，二者均为遗传易感、免疫失调、微生物因素和环境诱因共同驱动的慢性复发性肠道炎症。急性发作可表现为腹泻、腹痛、直肠出血、里急后重、发热、体重下降、贫血，或累及关节、皮肤、眼和肝胆系统的肠外表现。评估需区分活动性炎症、感染、肠易激综合征、药物影响和结构性并发症。检查可包括血常规、炎症指标、粪便检测、粪钙卫蛋白、内镜、活检，以及疑似小肠病变或脓肿时的断层影像。治疗取决于病变部位、严重程度、既往反应和并发症。可选方案包括特定溃疡性结肠炎患者使用氨基水杨酸类，糖皮质激素诱导缓解，免疫调节剂、生物制剂、小分子药物、营养支持，以及难治或复杂病例手术。长期管理包括疫苗接种、癌症监测、骨健康和药物毒性监测。",
          "internal-medicine-pulmonary-embolism-diagnosis-and-risk-stratification": "肺栓塞是血栓物质通常来自下肢或盆腔深静脉，阻塞肺动脉循环。危险因素包括近期手术、创伤、制动、癌症、妊娠、雌激素治疗、遗传性血栓形成倾向、既往静脉血栓栓塞和急性内科疾病。临床表现多样，可有突发呼吸困难、胸膜性胸痛、咳嗽、咯血、晕厥、心动过速、低氧血症或深静脉血栓体征。诊断从估计验前概率开始。低危患者可用D-二聚体排除疾病，需要影像时常用CT肺动脉造影。血流动力学不稳定提示大面积栓塞，需要紧急评估。治疗包括抗凝，疗程由诱发因素和复发风险决定。休克或严重右室功能障碍的高危患者可考虑溶栓、导管治疗或外科取栓。预防依赖住院和术后患者适当血栓预防。",
          "internal-medicine-acute-kidney-injury-in-hospitalized-patients": "急性肾损伤是肾功能突然下降，表现为血清肌酐升高、尿量减少或二者兼有。它在住院患者中常见，并与死亡率升高、住院时间延长和后续慢性肾脏病相关。病因常分为肾前性低灌注、肾实质损伤和肾后性梗阻。脓毒症、脱水、心力衰竭、肾毒性药物、造影剂暴露、横纹肌溶解、肾小球肾炎和尿潴留均为常见因素。评估包括容量状态、用药复核、尿常规、尿沉渣镜检、电解质、疑似梗阻时肾脏超声，以及系统性疾病评估。管理重点是纠正低灌注、停用肾毒物、调整药物剂量、治疗感染或梗阻，并监测钾、酸碱状态和液体平衡。难治性高钾、严重酸中毒、肺水肿、尿毒症并发症或特定毒物暴露时需透析。恢复可能不完全，出院后应复查肾功能。",
          "internal-medicine-acute-ischemic-stroke": "急性缺血性卒中由动脉血栓、栓塞或小血管闭塞导致脑血流突然中断。症状取决于受累血管区域，可包括单侧无力、口角歪斜、言语障碍、视力丧失、共济失调、忽略、感觉缺失或意识改变。快速识别至关重要，因为再灌注治疗具有时间敏感性。初始评估包括气道和循环评估、血糖测定、神经功能评分、非增强头颅CT或MRI以排除出血，以及疑似大血管闭塞时行血管成像。符合条件者可在认可时间窗内接受静脉溶栓，近端大血管闭塞的部分患者可通过机械取栓改善结局。支持治疗包括血压管理、吞咽评估、抗血小板或抗凝决策、他汀治疗、静脉血栓栓塞预防和早期康复。二级预防针对高血压、糖尿病、吸烟、血脂异常、房颤和颈动脉病变。",
          "internal-medicine-peptic-ulcer-disease-and-helicobacter-pylori": "消化性溃疡是胃或十二指肠黏膜溃疡，源于攻击因素与黏膜防御失衡。幽门螺杆菌感染和非甾体抗炎药使用是最重要病因，吸烟、严重生理应激和某些药物也会增加风险。患者可出现上腹痛、早饱、恶心、腹胀、隐匿性出血、缺铁性贫血、黑便、呕血，或穿孔时突发剧烈腹痛。诊断可包括幽门螺杆菌非侵入检测、上消化道内镜和活检，尤其在存在警示症状或年龄较大者。治疗包括质子泵抑制剂抑酸、幽门螺杆菌根除治疗、停用或减少致溃疡药物，并处理出血、穿孔或梗阻等并发症。根除治疗后应确认疗效，复发或复杂病例需重新评估依从性、耐药性和其他病因。",
          "internal-medicine-thyrotoxicosis-and-graves-disease": "甲状腺毒症是甲状腺激素过量导致的临床状态，Graves病是常见病因，由促甲状腺激素受体抗体刺激甲状腺所致。患者可表现为体重下降、怕热、出汗、震颤、心悸、焦虑、腹泻、肌无力、月经紊乱或房颤。Graves病还可伴弥漫性甲状腺肿、眼病或胫前黏液性水肿。诊断依赖促甲状腺激素降低、游离甲状腺素或三碘甲状腺原氨酸升高，并结合抗体、摄碘率或超声血流判断病因。治疗包括β受体阻滞剂控制症状、抗甲状腺药物、放射性碘或手术。甲状腺危象是一种危及生命的重症，需要快速识别和综合治疗。长期随访应监测复发、甲减、药物不良反应和眼病进展。",
          "internal-medicine-gout-and-urate-crystal-arthritis": "痛风是单钠尿酸盐结晶沉积引起的炎症性关节炎，常与高尿酸血症、肾功能下降、利尿剂、肥胖、饮酒、富嘌呤饮食和代谢综合征有关。急性发作通常表现为一个或多个关节突发剧烈疼痛、红肿和压痛，第一跖趾关节最典型。诊断以在滑液中发现针状负性双折光尿酸盐结晶为标准；在典型病例中，也可结合临床表现、血尿酸和影像学判断。急性治疗包括非甾体抗炎药、秋水仙碱或糖皮质激素，选择取决于禁忌证和合并症。反复发作、痛风石、肾结石或慢性痛风性关节炎患者需降尿酸治疗。启动降尿酸时常需预防急性发作，并教育患者饮食、体重和药物依从性。",
          "internal-medicine-tuberculosis-diagnosis-and-treatment-principles": "结核病由结核分枝杆菌引起，最常累及肺部，但也可侵犯淋巴结、胸膜、骨、泌尿生殖道或中枢神经系统。肺结核可表现为持续咳嗽、发热、盗汗、体重下降、咯血、胸痛或乏力。诊断结合流行病学风险、胸部影像、痰涂片抗酸染色、分枝杆菌培养和核酸扩增检测。潜伏感染检测包括结核菌素皮试或干扰素γ释放试验，但不能区分活动病。治疗需采用多药联合方案，以防耐药并实现治愈。常用初始治疗包括异烟肼、利福平、吡嗪酰胺和乙胺丁醇，随后根据药敏和病变部位调整。需监测肝毒性、视神经毒性、药物相互作用和依从性。公共卫生措施包括隔离、接触者追踪和督导治疗。"
    };

    Object.assign(chineseReferenceMap, {
          "surgery-acute-appendicitis-and-surgical-decision-making": "急性阑尾炎常由阑尾腔梗阻诱发，随后腔内压力升高、细菌增殖、静脉回流受阻，并可能进展为缺血、坏疽或穿孔。患者多先出现脐周或上腹痛，随后转移至右下腹，可伴厌食、恶心、呕吐、低热和局限性压痛。诊断依赖病史、体格检查、炎症指标和影像学评估，儿童或孕妇常首选超声，成人疑难病例可行CT。治疗需结合穿孔风险、全身状况和影像结果，通常包括镇痛、补液、抗生素和阑尾切除，部分非复杂病例可在严密选择下接受抗生素治疗。",
          "surgery-gallstone-disease-and-acute-cholecystitis": "胆石症可无症状，也可因胆囊管短暂梗阻导致胆绞痛。若梗阻持续并引发胆囊壁炎症，即形成急性胆囊炎，表现为右上腹痛、发热、恶心、Murphy征阳性和炎症指标升高。超声是首选检查，可显示胆石、胆囊壁增厚或胆囊周围液体。治疗包括禁食、补液、镇痛、抗菌治疗和及时腹腔镜胆囊切除；若病情危重或手术风险高，可考虑经皮胆囊造瘘作为桥接处理。",
          "surgery-colorectal-cancer-screening-and-staging": "结直肠癌多由腺瘤-癌序列逐步发展，筛查可在癌前阶段发现并切除病变。常用筛查方式包括粪便免疫化学试验、结肠镜、乙状结肠镜和影像学检查，选择取决于风险分层和当地条件。症状可包括排便习惯改变、便血、缺铁性贫血、腹痛、体重下降或肠梗阻。确诊需结肠镜活检，分期结合CT、MRI、直肠超声或PET等评估局部侵犯和转移。治疗依据分期制定，可包括手术切除、化疗、放疗、靶向治疗和免疫治疗。",
          "surgery-trauma-hemorrhage-and-damage-control-resuscitation": "创伤性出血可迅速导致休克、凝血障碍、低体温和酸中毒。损伤控制复苏强调早期识别致命出血、限制晶体液过量输注、尽早平衡输注红细胞、血浆和血小板，并及时使用止血措施。评估需关注气道、呼吸、循环、意识和暴露，同时寻找胸腔、腹腔、骨盆、长骨和外部出血来源。控制出血可依靠压迫、止血带、骨盆固定、介入栓塞或手术。损伤控制手术以快速止血和污染控制为目标，待生理状态改善后再行确定性修复。",
          "surgery-breast-cancer-evaluation-and-multimodal-therapy": "乳腺癌评估通常结合临床查体、乳腺影像和粗针穿刺活检。病理报告需明确浸润性或原位病变、组织学类型、分级、雌孕激素受体、HER2状态和增殖指数。治疗采用多模式策略，依据分期、肿瘤生物学和患者偏好选择手术、放疗、化疗、内分泌治疗、抗HER2治疗、免疫治疗或靶向治疗。保乳手术与放疗可在部分患者中获得与乳房切除相近的肿瘤控制。沟通时需同时关注生存获益、复发风险、淋巴水肿、生育力和身体形象。",
          "surgery-inguinal-hernia-diagnosis-and-repair": "腹股沟疝是腹腔内容物经腹股沟区薄弱处突出，可表现为站立、咳嗽或用力时增大的可复性包块。疼痛、嵌顿或绞窄提示并发症风险，需及时评估。诊断多依赖病史和体格检查，肥胖或体征不明确时可用超声或CT辅助。无症状或轻症男性可选择观察等待，但症状明显、女性患者或并发症风险高者通常建议修补。手术可采用开放或腹腔镜方式，并常使用补片降低复发率；术后需关注疼痛、感染、血肿和慢性腹股沟痛。",
          "surgery-perioperative-infection-prevention": "围手术期感染预防需要在术前、术中和术后多个环节降低病原体污染和宿主易感性。措施包括术前皮肤准备、必要时去除毛发、控制血糖、戒烟、优化营养、合理使用预防性抗生素并在切皮前达到有效血药浓度。术中应维持无菌操作、体温、氧合和止血，减少不必要的手术时间和异物暴露。术后需规范伤口护理、尽早拔除不必要导管，并监测发热、红肿、渗液或疼痛加重。抗生素选择应基于手术类型、污染程度和当地耐药情况，避免不必要延长用药。",
          "surgery-acute-pancreatitis-and-surgical-consultation": "急性胰腺炎多由胆石或酒精引起，也可与高甘油三酯血症、药物、创伤或操作有关。典型表现为突发上腹痛向背部放射，伴恶心、呕吐和腹部压痛。诊断依据典型疼痛、胰酶升高和必要时影像学证据。早期治疗以评估严重程度、补液、镇痛、营养支持和处理病因为主。外科会诊用于疑似胆源性病因、感染性坏死、腹腔并发症或需要胆囊切除者；无菌坏死通常不急于手术，感染坏死可采用逐步升级的介入或手术清创策略。",
          "surgery-thyroid-nodules-and-surgical-indications": "甲状腺结节常见，多数为良性。评估包括病史、颈部查体、促甲状腺激素水平、超声风险分层和必要时细针穿刺细胞学。恶性风险与低回声、微钙化、不规则边界、纵横比异常、淋巴结异常以及放射暴露史有关。手术适应证包括明确或疑似恶性、压迫症状、胸骨后甲状腺肿、功能自主结节或患者偏好。手术范围需结合细胞学、分子检测、肿瘤大小、淋巴结状态和复发风险决定，并需告知喉返神经损伤、低钙血症和甲状腺激素替代等问题。",
          "surgery-postoperative-ileus-after-abdominal-surgery": "术后肠麻痹是腹部手术后胃肠动力暂时抑制，表现为腹胀、恶心、呕吐、停止排气排便和不能耐受进食。其发生与肠道操作、炎症反应、阿片类镇痛药、电解质紊乱和卧床有关。诊断需与机械性肠梗阻、吻合口漏、腹腔感染和出血等并发症鉴别。处理包括纠正电解质、减少阿片用量、鼓励早期下床、咀嚼口香糖、逐步恢复饮食和必要时胃肠减压。若症状持续或加重，应行影像学检查寻找机械性梗阻或腹腔并发症。",
          "surgery-small-bowel-obstruction": "小肠梗阻是小肠内容物通过受阻，常见原因包括术后粘连、疝、肿瘤、炎症狭窄和肠扭转。患者可出现阵发性腹痛、呕吐、腹胀和停止排气排便。评估应注意脱水、发热、心动过速、腹膜刺激征、乳酸升高和绞窄缺血迹象。CT有助于明确梗阻部位、程度、病因和并发症。初始治疗包括禁食、静脉补液、电解质纠正、镇痛和必要时鼻胃管减压。若疑似闭袢梗阻、绞窄、穿孔、完全梗阻或保守治疗失败，应及时手术。",
          "surgery-liver-trauma-and-nonoperative-management": "肝外伤可由钝性或穿透性损伤导致，严重程度从包膜下血肿到肝实质裂伤和大血管损伤不等。血流动力学稳定者常可非手术治疗，包括严密监测生命体征、血红蛋白、腹部体征和影像变化。增强CT用于损伤分级和发现活动性出血。非手术治疗可结合输血、介入栓塞、重症监护和并发症处理。若患者血流动力学不稳定、持续出血、腹膜炎或合并需手术的其他腹腔损伤，则需手术探查。并发症包括胆漏、脓肿、迟发出血和肝坏死。",
          "surgery-peripheral-arterial-disease-and-limb-ischemia": "外周动脉疾病多由动脉粥样硬化导致下肢供血不足。患者可表现为间歇性跛行、静息痛、皮肤温度下降、足部溃疡或坏疽。危险因素包括吸烟、糖尿病、高血压、血脂异常和慢性肾脏病。评估包括脉搏检查、踝肱指数、血管超声、CTA或MRA。治疗包括戒烟、运动治疗、抗血小板、他汀、控制危险因素和足部护理。严重肢体缺血或组织缺损者需血运重建，可采用腔内治疗、旁路手术或混合策略，以缓解疼痛、促进创面愈合并保肢。",
          "surgery-abdominal-aortic-aneurysm": "腹主动脉瘤是腹主动脉永久性局限扩张，常与动脉粥样硬化、吸烟、年龄增长、男性、家族史和高血压相关。多数患者无症状，通过筛查或影像偶然发现；扩大或破裂时可出现腹痛、背痛、低血压或搏动性腹部包块。超声适合筛查和随访，CT血管成像用于手术规划。处理取决于瘤体直径、增长速度、症状和手术风险。较小无症状动脉瘤可定期随访和控制危险因素；达到修复阈值、有症状或破裂风险高者可行开放修复或腔内动脉瘤修复。",
          "surgery-surgical-management-of-diverticulitis": "憩室炎是结肠憩室发生炎症，常表现为左下腹痛、发热、白细胞增多和排便习惯改变。CT可确认诊断并评估脓肿、穿孔、瘘管或梗阻等复杂情况。轻症非复杂憩室炎可门诊处理，选择性使用抗生素、饮食调整和随访。复杂病例可能需要静脉抗生素、经皮脓肿引流或手术。手术适应证包括弥漫性腹膜炎、未控制脓毒症、治疗失败、复发严重影响生活质量、狭窄、瘘管或不能排除肿瘤。术式需根据污染程度、患者稳定性和基础状况决定。",
          "surgery-diabetic-foot-infection-and-debridement": "糖尿病足感染多发生在神经病变、外周动脉疾病和足部溃疡基础上。临床可见红肿热痛、脓性分泌物、恶臭、坏死、全身症状或骨外露。评估需判断感染严重度、溃疡深度、血供、血糖控制和骨髓炎可能。可根据情况使用探骨试验、炎症指标、X线、MRI和骨培养。管理包括减压、创面护理、优化血糖、血管评估、合适抗生素和清除坏死组织。坏死性感染、深部脓肿、筋膜室综合征、严重缺血伴感染或全身中毒时需急诊手术；保肢可能需要血运重建。",
          "surgery-esophageal-cancer-and-dysphagia": "食管癌包括鳞癌和腺癌，其流行病学受烟草、酒精、胃食管反流病、Barrett食管、肥胖、饮食和环境暴露影响。进行性吞咽困难是典型症状，初为固体食物困难，后发展到液体。其他表现包括体重下降、吞咽痛、反流、胸部不适、声音嘶哑、咳嗽、误吸或缺铁性贫血。确诊需上消化道内镜活检，分期可用CT、超声内镜、PET和必要时支气管镜。治疗取决于分期、部位、组织学、体能状态和患者目标，可包括内镜治疗、手术、放化疗、系统治疗、支架、营养支持和姑息治疗。",
          "surgery-acute-limb-ischemia": "急性肢体缺血是动脉灌注突然下降并威胁肢体活力。病因包括房颤栓塞、病变动脉原位血栓、移植物闭塞、创伤、夹层和高凝状态。典型表现为疼痛、苍白、无脉、感觉异常、运动麻痹、皮温降低和花斑。神经功能缺损的持续时间和严重程度是判断肢体可挽救性的关键。治疗不应因检查而延误，除非禁忌，应立即给予肝素抗凝、镇痛、可行时血管影像，并紧急血管外科会诊。血运重建可采用导管溶栓、取栓、成形、支架、旁路或混合手术；再灌注后可能需筋膜切开。",
          "surgery-postoperative-venous-thromboembolism-prevention": "术后静脉血栓栓塞包括深静脉血栓和肺栓塞，可导致显著发病率和死亡率。手术创伤、制动、静脉淤滞、炎症、癌症、肥胖、高龄、既往血栓、血栓形成倾向和雌激素暴露会增加风险。预防始于个体化风险评估，并平衡血栓和出血风险。机械措施包括早期下床、梯度弹力袜和间歇充气加压装置。药物预防可使用低分子肝素、普通肝素、磺达肝癸钠或部分口服抗凝药。大型骨科、肿瘤和盆腔手术常需更强化或延长预防。临床监测需注意小腿肿胀、不明原因心动过速、呼吸困难、低氧或胸膜性疼痛。",
          "surgery-gastric-cancer-surgical-principles": "胃癌是恶性上皮性肿瘤，与幽门螺杆菌感染、萎缩性胃炎、肠化生、吸烟、高盐饮食、家族史和遗传综合征相关。早期可无症状，进展期可出现体重下降、上腹痛、早饱、呕吐、贫血、黑便或淋巴结肿大。诊断依赖胃镜活检，分期包括CT、选择性超声内镜、腹腔镜探查腹膜病变以及系统治疗前生物标志物检测。局限可切除疾病以手术切除为核心，可行远端、次全或全胃切除，并进行适当淋巴结清扫和消化道重建。围手术期或辅助化疗可改善许多患者结局，特定情境下使用放化疗或靶向治疗。",
          "obstetrics-and-gynecology-preeclampsia-and-maternal-endothelial-dysfunction": "子痫前期是妊娠特异性高血压疾病，表现为妊娠中期以后新发高血压，并伴蛋白尿或母体器官功能障碍。异常胎盘形成、螺旋动脉重塑受损、抗血管生成因子和全身内皮功能障碍可导致血管收缩、毛细血管渗漏、血小板活化和器官灌注下降。临床可有头痛、视觉障碍、上腹痛、水肿、血小板减少、肝酶升高、肾损伤、胎儿生长受限或肺水肿。诊断需准确测压并检查尿蛋白、血小板、肌酐和肝酶。重症可进展为子痫、卒中、胎盘早剥或母体死亡。处理依据孕周和严重程度，包括重度高血压降压、硫酸镁预防惊厥、胎儿监测和适时终止妊娠。",
          "obstetrics-and-gynecology-gestational-diabetes-mellitus": "妊娠期糖尿病是在妊娠期间首次发现的糖耐量异常，与胎盘激素介导的胰岛素抵抗相关。危险因素包括肥胖、高龄、既往妊娠糖尿病、糖尿病家族史、多囊卵巢综合征和特定族群背景。筛查可采用一步法或两步法口服葡萄糖耐量试验。母体高血糖会增加巨大儿、肩难产、新生儿低血糖、剖宫产、高血压疾病以及母婴日后2型糖尿病风险。治疗从营养治疗、体力活动和自我血糖监测开始，未达标时常用胰岛素，部分口服药可按指南和个体情况考虑。产后需复查糖代谢，并长期进行体重管理和代谢随访。",
          "obstetrics-and-gynecology-ectopic-pregnancy-and-early-diagnosis": "异位妊娠是受精卵着床于宫腔以外，最常见于输卵管。危险因素包括既往异位妊娠、输卵管手术、盆腔炎、辅助生殖、吸烟，以及带器妊娠失败。患者可出现停经、下腹痛、阴道流血，若破裂并发生腹腔内出血，可有肩痛、头晕或晕厥。诊断需高度警惕，结合定量β-hCG、经阴道超声和血流动力学稳定性评估。β-hCG超过判别区而未见宫内妊娠时，应谨慎评估而非机械干预。稳定且符合条件的小型未破裂异位妊娠可用甲氨蝶呤，并需可靠随访；破裂、不稳定、药物禁忌或诊断不明时需手术。",
          "obstetrics-and-gynecology-endometriosis-and-chronic-pelvic-pain": "子宫内膜异位症是一种雌激素依赖性慢性炎症性疾病，表现为子宫内膜样组织位于宫腔以外。病灶可累及卵巢、盆腔腹膜、骶韧带、肠道、膀胱或手术瘢痕。机制可能包括经血逆流、免疫失调、体腔上皮化生、干细胞迁移和遗传易感。症状包括痛经、深部性交痛、慢性盆腔痛、排便痛、尿痛、不孕、乏力和周期性疼痛加重。查体可见骶韧带结节、子宫后倾固定、附件压痛或盆底肌高张。影像有助于识别内膜异位囊肿或深部浸润病变，部分病例需腹腔镜和病理确认。治疗可包括NSAIDs、激素治疗、GnRH类似物、生育导向治疗、盆底康复或保守手术。",
          "obstetrics-and-gynecology-uterine-fibroids-and-abnormal-uterine-bleeding": "子宫肌瘤是子宫肌层良性平滑肌肿瘤，可位于黏膜下、肌壁间、浆膜下或带蒂。其生长受雌激素、孕激素、细胞外基质沉积和遗传因素影响。许多肌瘤无症状，但黏膜下或较大肌壁间肌瘤可导致月经过多、贫血、盆腔压迫、尿频、便秘、不孕、复发性流产或妊娠并发症。评估包括病史、盆腔检查、血常规、妊娠试验和盆腔超声；盐水灌注超声或MRI可进一步显示宫腔变形和手术解剖。治疗取决于症状、大小、部位、年龄、生育需求和偏好，可选择补铁、氨甲环酸、激素治疗、左炔诺孕酮宫内系统、GnRH药物、子宫动脉栓塞、肌瘤剔除或子宫切除。",
          "obstetrics-and-gynecology-preterm-labor-and-antenatal-corticosteroids": "早产临产是足月前规律宫缩并伴宫颈改变，是新生儿发病和死亡的重要原因。危险因素包括既往早产、多胎、宫颈短、宫内感染、子宫畸形、出血、吸烟和辅助生殖。评估包括核实孕周、宫缩、宫颈检查、胎儿状态、胎膜状态、感染评估，必要时测宫颈长度或胎儿纤维连接蛋白。处理取决于孕周、母体状况和胎儿情况。宫缩抑制剂可短暂延迟分娩，以便转运或完成促胎肺成熟治疗。产前糖皮质激素可在合适孕周窗口内降低早产儿呼吸窘迫等并发症。早期早产可用硫酸镁进行胎儿神经保护；抗生素用于胎膜早破或B族链球菌预防，而非单纯早产临产常规治疗。",
          "obstetrics-and-gynecology-cervical-cancer-screening-and-hpv-prevention": "宫颈癌与高危型人乳头瘤病毒持续感染密切相关，病毒蛋白可影响细胞周期调控并促进癌变。筛查可在浸润癌发生前发现宫颈上皮内瘤变。策略包括细胞学、高危HPV检测或联合筛查，间隔依据年龄、结果、免疫状态和既往史决定。异常结果可按风险进行复查、阴道镜、定向活检或切除治疗。浸润性病变可表现为性交后出血、经间期出血、恶臭分泌物、盆腔痛或晚期泌尿直肠症状。预防依赖HPV疫苗、安全性行为、戒烟和有组织筛查。治疗按分期选择手术、同步放化疗、近距离放疗、系统治疗、免疫治疗或姑息照护。",
          "obstetrics-and-gynecology-polycystic-ovary-syndrome": "多囊卵巢综合征是常见内分泌疾病，在排除相关疾病后，以排卵障碍、高雄激素表现和多囊卵巢形态为特征。胰岛素抵抗和代偿性高胰岛素血症促进卵巢雄激素生成并增加代谢风险。患者可有月经不规则、不孕、多毛、痤疮、雄激素性脱发、体重增加或黑棘皮病。评估包括月经史、雄激素过多体征、妊娠试验、必要时甲状腺和泌乳素评估、雄激素测定以及代谢筛查。超声有帮助但并非所有患者必需。管理依据生育目标和症状负担制定，生活方式干预有助于体重、心代谢健康和排卵；复方激素避孕药可调经并改善雄激素症状，来曲唑常用于不孕促排。",
          "obstetrics-and-gynecology-placenta-previa-and-antepartum-hemorrhage": "前置胎盘是胎盘组织部分或完全覆盖宫颈内口，可导致无痛性产前出血。危险因素包括既往剖宫产、多胎、高龄、吸烟、辅助生殖、多产和既往子宫手术。经阴道超声安全且能准确定位胎盘。排除前置胎盘前应避免阴道指检，以免诱发严重出血。出血可间歇且不可预测，需评估母体血流动力学、胎儿情况、孕周、血红蛋白、凝血状态和备血需求。处理可包括观察、活动调整、可能早产时促胎肺成熟、必要时Rh免疫球蛋白，以及持续前置胎盘者计划剖宫产。出血失控、母体不稳或胎儿窘迫时需急诊分娩。",
          "obstetrics-and-gynecology-pelvic-inflammatory-disease": "盆腔炎性疾病是女性上生殖道上行感染，可累及子宫内膜、输卵管、卵巢或盆腔腹膜。常与沙眼衣原体和淋病奈瑟菌等性传播病原体相关，也可由厌氧菌、生殖支原体和阴道菌群参与。症状包括下腹痛、异常分泌物、发热、性交痛、尿痛、经间期出血或附件压痛。由于临床表现常不特异，育龄期患者出现盆腔痛并有宫颈举痛、子宫或附件压痛且无更好解释时，不应延迟治疗。评估可包括妊娠试验、性传播感染核酸检测、炎症指标、盆腔超声和输卵管卵巢脓肿评估。经验性广谱抗生素应覆盖可能病原体，性伴需评估和治疗。延误治疗会增加不孕、异位妊娠和慢性盆腔痛风险。",
          "obstetrics-and-gynecology-postpartum-hemorrhage": "产后出血是分娩后出血过多，仍是全球孕产妇发病和死亡的重要原因。主要病因常概括为子宫收缩乏力、胎盘组织残留、产道损伤和凝血障碍。危险因素包括产程延长、子宫过度膨胀、绒毛膜羊膜炎、手术助产、前置胎盘、胎盘早剥、既往出血和子宫肌瘤，但也可无预警发生。处理需快速估计失血量、评估生命体征、子宫张力并寻找出血来源。初始治疗包括子宫按摩、缩宫素、建立静脉通路、液体复苏、实验室检查和必要时启动大量输血流程。还可需要其他宫缩剂、氨甲环酸、手取胎盘、修补裂伤、球囊填塞、子宫动脉栓塞、压迫缝合或子宫切除。",
          "obstetrics-and-gynecology-premature-rupture-of-membranes": "胎膜早破指临产前胎膜破裂，若发生在足月前则称早产胎膜早破。其可能与胎膜薄弱、感染、宫颈机能不全、出血、吸烟、多胎或既往早产有关。患者通常诉突发大量或持续阴道流出清亮液体。诊断依据无菌窥器检查、见羊水流出、pH检测、羊齿状结晶或生化检测。除非即将分娩，应尽量减少阴道指检，以降低感染风险。处理取决于孕周、胎儿状态、感染、临产和期待治疗禁忌。足月破膜通常引产或计划分娩；早产破膜可能需要住院、潜伏期抗生素、产前糖皮质激素、胎儿监测和适当时硫酸镁神经保护。绒毛膜羊膜炎、胎盘早剥、胎儿窘迫或产程进展需分娩。",
          "obstetrics-and-gynecology-ovarian-cancer-and-adnexal-mass-evaluation": "卵巢癌早期症状常不明显，进展后可出现腹胀、早饱、盆腹痛、尿频、体重变化或腹水。附件包块评估需结合年龄、绝经状态、症状、家族史、遗传风险、查体、超声特征和肿瘤标志物。经阴道超声可评估包块大小、实性成分、乳头状突起、分隔、双侧性和血流。CA-125在绝经后或疑似上皮性卵巢癌时有帮助，但特异性有限。疑似恶性者应转诊妇科肿瘤专科，避免不恰当穿刺或分期不足。治疗通常包括手术分期和减瘤，结合铂类化疗、靶向治疗或维持治疗，具体取决于组织学类型、分期、遗传检测和患者状况。",
          "obstetrics-and-gynecology-menopause-and-hormone-therapy": "绝经是卵巢卵泡功能下降导致月经永久停止，常伴潮热、盗汗、睡眠障碍、情绪波动、阴道干涩、性交痛和骨量减少。诊断多依据年龄和停经史，通常不需常规激素检测。治疗需评估症状严重度、子宫状态、心血管风险、乳腺癌风险、血栓风险和患者偏好。绝经激素治疗可有效缓解血管舒缩症状和泌尿生殖道症状，并预防骨量丢失，但并非适用于所有人。有子宫者需加用孕激素保护子宫内膜；局部阴道雌激素可用于泌尿生殖综合征。非激素治疗和生活方式干预也可作为选择。",
          "obstetrics-and-gynecology-infertility-evaluation-in-couples": "不孕症评估应同时考虑男女双方因素，通常在规律无保护性生活12个月未孕后开始，年龄较大或存在明显风险时应提前。女性评估包括排卵情况、卵巢储备、输卵管通畅性、子宫结构、内分泌疾病和子宫内膜异位症。男性评估以精液分析为基础，必要时检查激素、遗传因素或泌尿生殖系统异常。病史需包括月经、妊娠、手术、感染、药物、性生活频率和生活方式。治疗取决于病因，可包括诱导排卵、手术纠正、宫腔内人工授精、体外受精或供体配子。咨询应关注成功率、费用、多胎风险和心理压力。",
          "obstetrics-and-gynecology-postpartum-depression": "产后抑郁是分娩后发生的抑郁障碍，可影响母亲功能、亲子依恋和婴儿发育。症状包括持续情绪低落、兴趣减退、睡眠和食欲改变、内疚、焦虑、注意力下降、疲惫、无价值感，严重时可有自伤或伤婴念头。危险因素包括既往抑郁、产前焦虑、社会支持不足、伴侣暴力、妊娠并发症和睡眠剥夺。筛查可使用爱丁堡产后抑郁量表等工具。治疗包括心理治疗、社会支持、睡眠保护和抗抑郁药，哺乳期用药需权衡获益和风险。若出现精神病性症状、自杀风险或伤婴风险，应立即紧急处理。",
          "obstetrics-and-gynecology-ovarian-torsion": "卵巢扭转是卵巢及其血管蒂旋转导致静脉和动脉血流受阻，属于妇科急症。常见诱因包括卵巢囊肿、肿瘤、促排卵后卵巢增大和妊娠。患者通常突发单侧下腹痛，可伴恶心、呕吐和附件压痛。超声多普勒有助于评估卵巢增大、周边卵泡、蒂部旋涡征和血流，但血流存在不能排除扭转。若临床高度怀疑，不应因影像不典型而延误手术。腹腔镜探查和复位是主要治疗，尽量保留卵巢功能；坏死或疑似恶性时需个体化处理。",
          "obstetrics-and-gynecology-shoulder-dystocia-during-delivery": "肩难产是胎头娩出后胎肩不能通过常规牵引娩出，属于产科急症。危险因素包括胎儿巨大、母体糖尿病、既往肩难产、产程延长、器械助产和肥胖，但多数病例不可预测。诊断通常在胎头回缩或轻柔牵引无效时作出。处理需要立即呼叫帮助、记录时间、避免过度牵拉胎头，并按流程采取McRoberts体位、耻骨上压、内旋转手法、娩出后臂或其他措施。目标是尽快安全解除嵌顿，减少新生儿缺氧、臂丛神经损伤、锁骨或肱骨骨折以及母体产道损伤和产后出血。团队演练和清晰沟通可改善反应。",
          "obstetrics-and-gynecology-adenomyosis-and-dysmenorrhea": "子宫腺肌病是子宫内膜腺体和间质位于子宫肌层内，导致子宫增大、肌层肥厚和慢性炎症。患者常表现为进行性痛经、月经过多、慢性盆腔痛和不孕，也可无症状。查体可发现子宫弥漫性增大和压痛。经阴道超声和MRI可显示肌层不均、子宫壁增厚、肌层囊性灶或结合带增厚。治疗依据症状、年龄和生育要求选择NSAIDs、激素避孕药、孕激素、左炔诺孕酮宫内系统、GnRH类似物、保守手术或子宫切除。翻译时应注意将dysmenorrhea译为痛经，而非普通腹痛。",
          "obstetrics-and-gynecology-group-b-streptococcus-in-pregnancy": "B族链球菌可定植于孕妇胃肠道和泌尿生殖道，并导致新生儿早发型感染。妊娠晚期筛查和产时抗生素预防可降低新生儿败血症、肺炎和脑膜炎风险。危险因素包括早产、胎膜破裂时间长、产时发热、既往新生儿GBS病史和妊娠期GBS菌尿。筛查通常在妊娠36至37周进行阴道直肠拭子培养。筛查阳性、GBS菌尿或既往受累新生儿者，分娩时需静脉青霉素或合适替代药物。剖宫产前未临产且胎膜未破者通常无需预防。新生儿管理取决于症状、孕周、母体治疗和感染风险。",
          "pediatrics-bronchiolitis-in-infants": "婴儿毛细支气管炎是小气道病毒感染，常由呼吸道合胞病毒引起。患儿先有流涕、咳嗽和低热，随后出现喘鸣、呼吸急促、鼻翼扇动、胸壁凹陷或喂养困难。诊断主要依据临床表现，常规胸片和病毒检测通常不改变处理。治疗以支持为主，包括保持水化、清理鼻腔、必要时给氧和监测呼吸做功。支气管舒张剂、糖皮质激素和抗生素不应常规使用，除非存在其他明确指征。早产儿、年龄很小、基础心肺病或免疫低下者重症风险较高。",
          "pediatrics-pediatric-asthma-and-airway-inflammation": "儿童哮喘是一种慢性气道炎症性疾病，表现为可变性气流受限和气道高反应性。症状包括反复喘息、咳嗽、胸闷和呼吸困难，常在夜间、运动、感染、过敏原或冷空气暴露后加重。诊断依据症状模式、诱因、家族或过敏史以及可逆性气流受限证据。治疗包括避免诱因、吸入糖皮质激素等控制药物、短效支气管舒张剂缓解症状、哮喘行动计划和吸入技术教育。急性发作需评估呼吸窘迫、血氧和说话能力，并及时给予支气管舒张剂、氧疗和必要时全身激素。长期管理应定期评估控制水平和生长情况。",
          "pediatrics-neonatal-jaundice-and-hyperbilirubinemia": "新生儿黄疸由胆红素升高引起，多数为生理性，但过高的非结合胆红素可导致胆红素脑病和核黄疸。危险因素包括早产、溶血、母婴血型不合、G6PD缺乏、头颅血肿、喂养不足和黄疸出现过早。评估需结合出生小时龄、总胆红素水平、直接胆红素、体重变化、喂养和危险因素。治疗根据风险曲线选择加强喂养、光疗或换血。直接胆红素升高提示胆汁淤积，需要进一步评估胆道闭锁、感染、代谢病或内分泌疾病。出院后随访对预防重度高胆红素血症很重要。",
          "pediatrics-acute-gastroenteritis-and-dehydration": "儿童急性胃肠炎常由病毒、细菌或寄生虫引起，表现为腹泻、呕吐、腹痛、发热和脱水。评估重点是脱水程度，包括精神状态、口渴、眼窝、泪液、黏膜、毛细血管再充盈、心率、尿量和皮肤弹性。多数病例不需常规抗生素，治疗以口服补液盐为核心，继续适龄饮食并避免不必要禁食。重度脱水、休克、持续呕吐或不能口服者需静脉补液。粪便检查用于血便、重症、免疫低下、旅行相关或暴发病例。预防包括手卫生、疫苗接种和安全饮食饮水。",
          "pediatrics-congenital-heart-disease-and-cyanosis": "先天性心脏病可导致结构性心脏异常，其中部分表现为发绀。发绀提示动脉血氧饱和度降低，可能由右向左分流、肺血流减少或混合性循环引起。新生儿可出现青紫、喂养困难、呼吸急促、出汗、生长不良或心杂音。评估包括脉搏血氧筛查、四肢血压、体格检查、胸片、心电图和超声心动图。动脉导管依赖性病变需及时使用前列腺素E1维持导管开放，并转至专科中心。治疗取决于具体畸形，可包括药物稳定、导管介入、分期手术或根治手术。",
          "pediatrics-kawasaki-disease-and-coronary-artery-risk": "川崎病是一种儿童急性血管炎，主要累及中小动脉，最重要并发症是冠状动脉瘤。典型表现为持续发热，伴结膜充血、口唇和口腔改变、皮疹、肢端改变和颈部淋巴结肿大。不完全川崎病在婴幼儿中更常见，需结合炎症指标和超声心动图判断。早期使用静脉注射免疫球蛋白和阿司匹林可降低冠脉病变风险。治疗后需根据冠状动脉情况进行心脏随访，必要时抗血小板或抗凝治疗。持续或复发发热提示IVIG抵抗，可考虑糖皮质激素或其他抗炎治疗。",
          "pediatrics-pediatric-seizures-and-febrile-convulsions": "热性惊厥是幼儿发热时出现的惊厥，且无中枢神经系统感染、代谢紊乱或既往无热惊厥。单纯性热性惊厥为全身性、持续少于15分钟且24小时内不复发；复杂性惊厥则为局灶、时间长或反复。多数单纯热性惊厥预后良好，不需常规神经影像、脑电图或长期抗癫痫治疗。评估重点是寻找发热来源，并在颈强直、持续意识改变、瘀点、前囟隆起或中毒貌等情况下排除脑膜炎或脑炎。急性处理包括保护气道、侧卧、必要时测血糖，惊厥持续数分钟以上可用苯二氮䓬类。家长需了解复发风险、急救方法和何时就医。",
          "pediatrics-nephrotic-syndrome-in-children": "儿童肾病综合征以大量蛋白尿、低白蛋白血症、水肿和常伴高脂血症为特征。微小病变病是幼儿最常见病因，通常对糖皮质激素敏感。水肿来自尿白蛋白丢失、血浆胶体渗透压下降、肾钠潴留和神经激素通路激活。患儿可有眼睑水肿、依赖性水肿、腹水、体重增加、泡沫尿或尿量减少。评估包括尿常规、尿蛋白肌酐比、血清白蛋白、肌酐、胆固醇、必要时补体和继发病因评估。并发症包括感染、血栓、低血容量、急性肾损伤和药物毒性。典型激素敏感病例可用激素、限盐、水肿管理、疫苗评估和感染预防；不典型者需考虑肾活检。",
          "pediatrics-pediatric-iron-deficiency-anemia": "儿童缺铁性贫血是常见营养性疾病，源于摄入不足、需求增加、吸收障碍或慢性失血。婴儿、幼儿、青少年和限制性饮食儿童尤其易感。铁参与血红蛋白合成、髓鞘形成、免疫功能和神经发育。症状包括苍白、乏力、烦躁、喂养差、异食癖、心动过速、劳力性呼吸困难或注意力受损，轻症可无症状。实验室通常显示低血红蛋白、小细胞低色素、红细胞分布宽度增高、铁蛋白低和转铁蛋白饱和度低。治疗包括寻找病因、增加膳食铁、限制幼儿过量牛奶摄入，并给予口服铁和依从性指导。治疗有效后血红蛋白应升高，但需继续补足铁储备。",
          "pediatrics-childhood-obesity-and-metabolic-health": "儿童肥胖是一种慢性疾病，受遗传易感、宫内因素、饮食、体力活动、睡眠、心理社会压力、药物和环境影响。它与胰岛素抵抗、血脂异常、高血压、代谢功能障碍相关脂肪性肝病、阻塞性睡眠呼吸暂停、骨科问题、性早熟、抑郁以及成年期肥胖持续相关。评估包括体质指数百分位、增长轨迹、家族史、饮食、活动、睡眠、屏幕时间、血压和合并症筛查。实验室可查血脂、血糖或糖化血红蛋白和肝酶。管理应以家庭为中心、避免污名化并符合发育阶段，结合营养咨询、减少含糖饮料和超加工食品、增加活动、保证睡眠、行为干预和治疗合并症。严重青少年肥胖可在专科监督下考虑药物或代谢手术。",
          "pediatrics-type-1-diabetes-in-children": "儿童1型糖尿病是自身免疫性胰岛β细胞破坏导致绝对胰岛素缺乏。患儿可表现为多尿、多饮、体重下降、乏力、视物模糊、夜间遗尿，或以糖尿病酮症酸中毒起病，出现呕吐、腹痛、脱水、Kussmaul呼吸和意识改变。诊断依据伴症状的高血糖、糖化血红蛋白、血糖检测，并常用胰岛自身抗体辅助分型。管理需要终身胰岛素替代，可采用多次皮下注射或泵治疗，同时进行血糖监测或连续葡萄糖监测、碳水化合物计数、营养教育、运动规划和低血糖预防。家庭需学习病日规则、酮体检测、胰高糖素使用和学校照护计划。酮症酸中毒需谨慎补液、胰岛素输注、电解质监测并预防脑损伤。",
          "pediatrics-pediatric-pneumonia": "儿童社区获得性肺炎是病毒、典型细菌、非典型细菌或混合病原体引起的肺实质感染。年龄、免疫接种、季节、暴露史和合并症影响可能病因。症状可包括发热、咳嗽、呼吸急促、胸痛、腹痛、喂养差、呻吟、鼻翼扇动、三凹征或低氧血症。呼吸急促是重要体征，但单一表现不能可靠区分病毒和细菌感染。门诊多依据临床诊断；重症、低氧、疑似并发症或诊断不明时行胸片。治疗包括支持护理、退热、补液、必要时氧疗，以及疑似细菌性肺炎时经验性抗生素。免疫接种儿童非复杂肺炎常用阿莫西林；住院指征包括呼吸窘迫、不能饮水、低氧、年龄小、严重合并症或随访不可靠。",
          "pediatrics-sepsis-in-children": "儿童脓毒症是感染和异常宿主反应导致的危及生命的器官功能障碍。婴幼儿可能迅速恶化，早期体征可不典型。表现包括发热或低体温、心动过速、呼吸急促、灌注差、意识改变、毛细血管再充盈延长、脉搏弱、皮肤花斑、少尿、低血压或呼吸窘迫。常见来源包括肺炎、脑膜炎、尿路感染、腹腔感染、皮肤感染和导管相关血流感染。处理强调快速识别、可及时测乳酸、培养不应延误治疗、使用广谱抗菌药，并根据灌注和容量负荷风险进行液体复苏。初始复苏后休克仍持续需血管活性药。儿童低血压常为晚期体征，需结合年龄特异性生理判断。",
          "pediatrics-meningitis-in-infants-and-children": "脑膜炎是细菌、病毒、真菌或非感染因素引起的脑膜炎症。细菌性脑膜炎是急症，延误治疗会增加死亡、听力损失、癫痫、脑积水和神经发育受损风险。症状随年龄不同，婴儿可有发热、喂养差、烦躁、嗜睡、前囟膨隆、呕吐、呼吸暂停或惊厥；较大儿童可有头痛、畏光、颈强直、意识改变和瘀点样皮疹。评估包括血培养、炎症指标、安全时腰穿行脑脊液分析，只有存在特定风险因素时才在腰穿前做神经影像。疑似细菌性脑膜炎应立即经验性抗生素覆盖年龄相关病原体，部分病例可加用糖皮质激素。病毒性多可自限，但单纯疱疹需抗病毒治疗。",
          "pediatrics-acute-otitis-media": "急性中耳炎是儿童常见感染，通常继发于病毒性上呼吸道感染和咽鼓管功能障碍，表现为中耳炎症和积液。常见病原体包括肺炎链球菌、不可分型流感嗜血杆菌、卡他莫拉菌和呼吸道病毒。症状包括耳痛、发热、烦躁、睡眠差、听力下降、耳漏或喂养差。诊断需要急性症状并有鼓膜膨隆、中耳积液、活动度下降、红斑或穿孔流脓等耳镜证据。过度诊断会导致不必要抗生素使用，因此仔细查体很重要。镇痛是治疗核心。重症、年龄很小、特定年龄双侧感染或耳漏者建议立即抗生素，轻症且随访可靠者可观察。反复发作者需评估听力和危险因素，必要时考虑鼓膜置管。",
          "pediatrics-urinary-tract-infection-in-children": "儿童尿路感染可累及膀胱或肾脏，反复肾盂肾炎或合并尿路异常时可导致肾瘢痕。婴儿可表现为发热、喂养差、呕吐、黄疸、烦躁或生长不良；较大儿童可诉尿痛、尿频、尿急、腹痛、腰痛或新发尿失禁。诊断需有脓尿和经合适采集尿标本证实的显著细菌生长。尿袋标本可筛查但不能确认培养。经验性抗生素需考虑年龄、病情严重度、当地耐药和口服耐受情况。发热或中毒貌婴儿可能需静脉治疗并评估菌血症。年轻儿童发热性尿感或反复病例后常用肾膀胱超声。复发时应考虑排尿功能障碍、便秘、膀胱输尿管反流和解剖梗阻。",
          "pediatrics-henoch-schonlein-purpura": "过敏性紫癜又称IgA血管炎，是儿童最常见的小血管炎之一，常发生于上呼吸道感染后。其特征为无血小板减少的可触性紫癜、关节痛或关节炎、腹痛和肾受累。皮疹多见于下肢和臀部。胃肠表现可包括绞痛、呕吐、消化道出血或肠套叠。肾病变从镜下血尿和轻度蛋白尿到肾炎或肾病综合征表现不等。诊断通常依据临床，并结合尿常规、血压、肾功能、血常规和腹部并发症评估。多数病例自限，治疗以补液、镇痛和监测为主。糖皮质激素可缓解严重腹痛或关节症状，但不能可靠预防肾炎。长期随访重点是血压、尿检和蛋白尿。",
          "pediatrics-neonatal-respiratory-distress-syndrome": "新生儿呼吸窘迫综合征由肺表面活性物质缺乏和肺结构不成熟引起，主要见于早产儿。表面活性物质不足使肺泡在呼气末塌陷，肺顺应性下降，呼吸做功增加并发生低氧血症。出生后不久出现呼吸急促、呻吟、鼻翼扇动、肋间凹陷、发绀和氧需求增加。早产、母亲糖尿病、未临产剖宫产、男性和围产期窒息增加风险。对有早产风险的孕妇给予产前糖皮质激素可促进胎肺成熟并减少并发症。诊断依据临床表现、血气、需氧情况和胸片低肺容量及弥漫网状颗粒影。治疗包括保温、温和通气、持续气道正压、氧浓度滴定、必要时补充表面活性物质，并预防气胸、支气管肺发育不良、感染和脑室内出血。",
          "pediatrics-attention-deficit-hyperactivity-disorder": "注意缺陷多动障碍是一种神经发育障碍，表现为与发育水平不相称的注意缺陷、多动和冲动，并在多个环境中损害功能。症状包括注意维持困难、组织能力差、健忘、话多、坐立不安、打断他人和任务完成差。诊断需要全面临床评估，收集家长和教师信息，确认症状持续时间、起病年龄、功能损害，并排除睡眠障碍、焦虑、抑郁、学习障碍、听力问题、创伤或甲状腺疾病等解释。还需考虑对立违抗行为、抽动、自闭谱系障碍和物质使用风险等共病。治疗为多模式，包括家长训练、课堂支持、行为干预和药物。兴奋剂对核心症状证据充分，非兴奋剂适用于部分患者。监测包括食欲、睡眠、血压、心率、生长、情绪、药物滥用风险和学业社交进展。",
          "pediatrics-pediatric-anaphylaxis": "儿童过敏反应是一种急性、可能危及生命的系统性超敏反应，涉及肥大细胞和嗜碱性粒细胞介质释放。常见诱因包括食物、昆虫叮咬、药物、乳胶和运动相关暴露。临床可表现为荨麻疹、血管性水肿、潮红、喘鸣、喉鸣、咳嗽、呕吐、腹痛、低血压、晕厥或幼儿突然行为改变。皮肤表现可缺如，因此诊断依赖识别暴露后快速出现的多系统受累或呼吸、心血管受损。大腿中外侧肌内注射肾上腺素是一线治疗，不应延误。其他处理包括气道评估、给氧、休克时静脉补液、支气管痉挛时吸入支气管舒张剂，并观察双相反应。抗组胺药和糖皮质激素可缓解部分症状，但不能替代肾上腺素。出院需进行诱因避免、肾上腺素自动注射器、书面行动计划和过敏专科转诊。"
    });

    function buildTermHints(article) {
      const haystack = `${article.englishTitle} ${article.englishText}`.toLowerCase();
      const matchedTerms = medicalTermGlossary
        .map((term, index) => ({ ...term, index, position: haystack.indexOf(term.en.toLowerCase()) }))
        .filter((term) => term.position !== -1)
        .sort((a, b) => a.position - b.position || b.en.length - a.en.length)
        .filter((term, index, terms) => {
          return terms.findIndex((item) => item.en.toLowerCase() === term.en.toLowerCase()) === index;
        });
      return matchedTerms.slice(0, 4);
    }

    const articles = literatureSegments.map((segment) => {
      const article = {
        ...segment,
        title: `${chineseTitleMap[segment.id] || segment.englishTitle} / ${segment.englishTitle}`,
        chineseTitle: chineseTitleMap[segment.id] || segment.chineseTitle,
        disease: segment.category,
        chapter: segment.sourceCategory,
        referenceTranslation: '',
        terms: [],
        tip: '新版文献库按大类组织。翻译时先抓住主题句，再处理并列风险因素、检查项目和治疗措施。'
      };
      article.referenceTranslation = buildReferenceNote(article);
      article.terms = buildTermHints(article);
      return article;
    });

    const storageKey = "medicalTranslationPractice.v1";
    const draftKey = "medicalTranslationDrafts.v1";

    const state = {
      currentId: articles[0].id,
      filter: "全部",
      searchTerm: "",
      feedbackVisible: false,
      records: loadJson(storageKey, []),
      drafts: loadJson(draftKey, {})
    };

    const els = {
      completedCount: document.getElementById("completedCount"),
      totalCount: document.getElementById("totalCount"),
      wordCount: document.getElementById("wordCount"),
      diseaseFilter: document.getElementById("diseaseFilter"),
      searchInput: document.getElementById("searchInput"),
      searchResults: document.getElementById("searchResults"),
      articleSelect: document.getElementById("articleSelect"),
      randomBtn: document.getElementById("randomBtn"),
      resetBtn: document.getElementById("resetBtn"),
      articleTitle: document.getElementById("articleTitle"),
      metaRow: document.getElementById("metaRow"),
      englishText: document.getElementById("englishText"),
      toggleReferenceBtn: document.getElementById("toggleReferenceBtn"),
      translationInput: document.getElementById("translationInput"),
      savedStatus: document.getElementById("savedStatus"),
      submitBtn: document.getElementById("submitBtn"),
      saveBtn: document.getElementById("saveBtn"),
      resultBanner: document.getElementById("resultBanner"),
      successToast: document.getElementById("successToast"),
      toastTitle: document.getElementById("toastTitle"),
      toastMessage: document.getElementById("toastMessage"),
      feedback: document.getElementById("feedback"),
      referenceTranslation: document.getElementById("referenceTranslation"),
      terms: document.getElementById("terms"),
      studyTip: document.getElementById("studyTip"),
      selfRate: document.getElementById("selfRate"),
      feedbackNote: document.getElementById("feedbackNote"),
      historyList: document.getElementById("historyList")
    };

    let toastTimer = null;
    let scrollTimer = null;

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function saveJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch (error) {
        return false;
      }
    }

    function getCurrentArticle() {
      return articles.find((article) => article.id === state.currentId) || articles[0];
    }

    function getFilteredArticles() {
      return articles.filter((article) => {
        const categoryMatched = state.filter === "全部" || article.category === state.filter;
        const keyword = state.searchTerm.trim().toLowerCase();
        const keywordMatched = !keyword || [
          article.chineseTitle,
          article.englishTitle,
          article.disease,
          article.category,
          article.chapter
        ].some((text) => text.toLowerCase().includes(keyword));
        return categoryMatched && keywordMatched;
      });
    }

    function countWords(text) {
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char];
      });
    }

    function buildOptions() {
      const categories = Array.from(new Set(articles.map((article) => article.category)));
      const orderedCategories = categoryOrder.filter((category) => category === "全部" || categories.includes(category));
      els.diseaseFilter.innerHTML = orderedCategories.map((category) => {
        return `<option value="${category}">${category}</option>`;
      }).join("");
      els.diseaseFilter.value = state.filter;
      updateArticleOptions();
    }

    function updateArticleOptions() {
      const filtered = getFilteredArticles();
      renderSearchResults(filtered);
      if (!filtered.length) {
        els.articleSelect.innerHTML = '<option value="">无匹配文献</option>';
        els.articleSelect.value = "";
        return filtered;
      }
      if (!filtered.some((article) => article.id === state.currentId)) {
        state.currentId = filtered[0].id;
      }
      els.articleSelect.innerHTML = filtered.map((article) => {
        return `<option value="${article.id}">${article.chineseTitle}</option>`;
      }).join("");
      els.articleSelect.value = state.currentId;
      return filtered;
    }

    function renderSearchResults(filtered) {
      const keyword = state.searchTerm.trim();
      if (!keyword) {
        els.searchResults.classList.remove("visible");
        els.searchResults.innerHTML = "";
        return;
      }

      els.searchResults.classList.add("visible");
      if (!filtered.length) {
        els.searchResults.innerHTML = '<div class="search-empty">无搜索结果</div>';
        return;
      }

      els.searchResults.innerHTML = filtered.slice(0, 8).map((article) => {
        return `<button type="button" class="search-result" data-id="${article.id}"><strong>${escapeHtml(article.chineseTitle)}</strong><span>${escapeHtml(article.englishTitle)} · ${escapeHtml(article.disease)}</span></button>`;
      }).join("");
    }

    function renderArticle() {
      const article = getCurrentArticle();
      els.articleTitle.textContent = article.title;
      els.englishText.textContent = article.englishText;
      els.wordCount.textContent = countWords(article.englishText);
      els.metaRow.innerHTML = [
        `<span class="chip accent">${article.disease}</span>`,
        `<span class="chip">${article.difficulty}</span>`
      ].join("");

      els.translationInput.value = state.drafts[article.id] || "";
      els.savedStatus.textContent = state.drafts[article.id] ? "已载入草稿" : "未保存";
      els.resultBanner.classList.remove("visible");
      els.resultBanner.textContent = "";
      renderFeedback(false);
      updateStats();
    }

    function renderFeedback(show) {
      state.feedbackVisible = show;
      const article = getCurrentArticle();
      els.feedback.classList.toggle("visible", show);
      els.toggleReferenceBtn.textContent = show ? "隐藏参考" : "查看参考";
      if (!show) {
        return;
      }

      els.referenceTranslation.textContent = article.referenceTranslation;
      els.terms.innerHTML = article.terms.map((term) => {
        return `<div class="term"><strong>${term.en}</strong> <span>${term.zh}</span><br>${term.note}</div>`;
      }).join("");
      els.studyTip.textContent = article.tip;
      els.feedbackNote.textContent = "选择自评后，本次练习会写入本地记录。";
      Array.from(els.selfRate.querySelectorAll("button")).forEach((button) => {
        button.classList.remove("selected");
      });
    }

    function updateStats() {
      const completed = new Set(state.records.map((record) => record.articleId)).size;
      els.completedCount.textContent = completed;
      els.totalCount.textContent = articles.length;
    }

    function saveDraft() {
      const article = getCurrentArticle();
      const value = els.translationInput.value.trim();
      if (value) {
        state.drafts[article.id] = value;
        els.savedStatus.textContent = "草稿已保存";
      } else {
        delete state.drafts[article.id];
        els.savedStatus.textContent = "未保存";
      }
      if (!saveJson(draftKey, state.drafts)) {
        els.savedStatus.textContent = "本地保存受限";
      }
    }

    function addRecord(rate) {
      const article = getCurrentArticle();
      const record = {
        articleId: article.id,
        title: article.title,
        disease: article.disease,
        rate,
        translatedChars: els.translationInput.value.trim().length,
        finishedAt: new Date().toISOString()
      };
      state.records = [record, ...state.records.filter((item) => item.articleId !== article.id)].slice(0, 8);
      saveJson(storageKey, state.records);
      renderHistory();
      updateStats();
      els.feedbackNote.textContent = "已保存本次练习记录。";
    }

    function renderHistory() {
      if (!state.records.length) {
        els.historyList.innerHTML = '<p class="empty-state">还没有练习记录。完成一次自评后会显示在这里。</p>';
        return;
      }

      els.historyList.innerHTML = state.records.map((record) => {
        const date = new Date(record.finishedAt);
        const dateText = date.toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
        return `<div class="history-item"><span><strong>${record.title}</strong> · ${record.disease}</span><span>${rateText(record.rate)} · ${dateText}</span></div>`;
      }).join("");
    }

    function rateText(rate) {
      return {
        1: "需重练",
        2: "基本理解",
        3: "较流畅",
        4: "可复述"
      }[rate] || "已完成";
    }

    function showToast(title, message = "") {
      clearTimeout(toastTimer);
      els.toastTitle.textContent = title;
      els.toastMessage.textContent = message;
      els.toastMessage.hidden = !message;
      els.successToast.classList.add("visible");
      toastTimer = setTimeout(() => {
        els.successToast.classList.remove("visible");
      }, 1000);
    }

    function scrollToFeedbackAfterToast() {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        els.feedback.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 850);
    }

    function chooseRandomArticle() {
      const filtered = getFilteredArticles();
      if (!filtered.length) {
        return;
      }
      const candidates = filtered.length > 1 ? filtered.filter((article) => article.id !== state.currentId) : filtered;
      const next = candidates[Math.floor(Math.random() * candidates.length)];
      state.currentId = next.id;
      els.articleSelect.value = state.currentId;
      renderArticle();
    }

    els.diseaseFilter.addEventListener("change", () => {
      state.filter = els.diseaseFilter.value;
      const filtered = updateArticleOptions();
      if (filtered.length) {
        renderArticle();
      }
    });

    els.searchInput.addEventListener("input", () => {
      state.searchTerm = els.searchInput.value;
      const filtered = updateArticleOptions();
      if (filtered.length) {
        renderArticle();
      }
    });

    els.searchInput.addEventListener("focus", () => {
      renderSearchResults(getFilteredArticles());
    });

    els.searchInput.addEventListener("blur", () => {
      setTimeout(() => {
        els.searchResults.classList.remove("visible");
      }, 120);
    });

    els.searchResults.addEventListener("mousedown", (event) => {
      const result = event.target.closest(".search-result");
      if (!result) {
        return;
      }
      event.preventDefault();
      const article = articles.find((item) => item.id === result.dataset.id);
      if (!article) {
        return;
      }
      state.currentId = article.id;
      state.searchTerm = article.chineseTitle;
      els.searchInput.value = article.chineseTitle;
      updateArticleOptions();
      els.searchResults.classList.remove("visible");
      renderArticle();
    });

    els.articleSelect.addEventListener("change", () => {
      if (!els.articleSelect.value) {
        return;
      }
      state.currentId = els.articleSelect.value;
      renderArticle();
    });

    els.randomBtn.addEventListener("click", chooseRandomArticle);

    els.resetBtn.addEventListener("click", () => {
      const article = getCurrentArticle();
      delete state.drafts[article.id];
      saveJson(draftKey, state.drafts);
      state.filter = "全部";
      state.searchTerm = "";
      state.currentId = articles[0].id;
      els.diseaseFilter.value = state.filter;
      els.searchInput.value = "";
      els.searchResults.classList.remove("visible");
      els.searchResults.innerHTML = "";
      updateArticleOptions();
      renderArticle();
      els.translationInput.value = "";
      els.savedStatus.textContent = "未保存";
      showToast("已清空输入");
    });

    els.saveBtn.addEventListener("click", saveDraft);

    els.submitBtn.addEventListener("click", () => {
      saveDraft();
      renderFeedback(true);
      els.resultBanner.textContent = "参考译文已展开，请向下查看中文翻译对照、重点术语和学习提示。";
      els.resultBanner.classList.add("visible");
      showToast("提交成功", "正在打开中文翻译对照");
      scrollToFeedbackAfterToast();
    });

    els.toggleReferenceBtn.addEventListener("click", () => {
      renderFeedback(!state.feedbackVisible);
    });

    els.translationInput.addEventListener("input", () => {
      els.savedStatus.textContent = "未保存更改";
    });

    els.selfRate.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-rate]");
      if (!button) {
        return;
      }
      Array.from(els.selfRate.querySelectorAll("button")).forEach((item) => item.classList.remove("selected"));
      button.classList.add("selected");
      addRecord(Number(button.dataset.rate));
    });

    buildOptions();
    renderArticle();
    renderHistory();
  </script>
  <script src="main.js"></script>
</body>
</html>
